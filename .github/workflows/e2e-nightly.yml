name: E2E Nightly Tests

# Run nightly tests for deeper regression detection
on:
  schedule:
    # Run every night at 2 AM UTC (adjust to your timezone)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  e2e-nightly:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-suite:
          - comprehensive-ui-integration
          - complete-feature-coverage
          - edge-cases-and-failures
          - security-session-auth
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: core/console/corvin_console/web-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: core/console/corvin_console/web-next

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: core/console/corvin_console/web-next

      - name: Build frontend
        run: npm run build
        working-directory: core/console/corvin_console/web-next

      - name: Run E2E tests with all browsers - ${{ matrix.test-suite }}
        id: nightly-test
        run: |
          npm run test:e2e -- tests/e2e/${{ matrix.test-suite }}.spec.ts \
            --reporter=html \
            --reporter=json \
            --reporter=github \
            --retries=2 \
            --timeout=60000
        working-directory: core/console/corvin_console/web-next
        continue-on-error: true
        timeout-minutes: 45
        env:
          CI: true

      - name: Upload detailed report - ${{ matrix.test-suite }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ matrix.test-suite }}-${{ github.run_number }}
          path: core/console/corvin_console/web-next/playwright-report/
          retention-days: 60

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ E2E Nightly Tests Failed: ${{ matrix.test-suite }}'
            });
          continue-on-error: true

  nightly-summary:
    runs-on: ubuntu-latest
    needs: e2e-nightly
    if: always()
    steps:
      - name: Prepare summary
        id: summary
        run: |
          if [ "${{ needs.e2e-nightly.result }}" == "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          fi

      - name: Create workflow summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🌙 E2E Nightly Test Results

          **Status:** ${{ steps.summary.outputs.emoji }} ${{ steps.summary.outputs.status }}

          ## Test Suites Executed
          - comprehensive-ui-integration (64 tests)
          - complete-feature-coverage (28 tests)
          - edge-cases-and-failures (70 tests)
          - security-session-auth (88 tests)

          **Total: 250+ tests**

          ## Coverage Areas
          - Full UI workflow testing
          - Multi-step feature dependencies
          - Security & authentication
          - Session management
          - Edge cases & error scenarios
          - Performance under stress
          - Offline/reconnection handling

          [View artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

  e2e-performance-report:
    runs-on: ubuntu-latest
    needs: e2e-nightly
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          pattern: nightly-report-*
        continue-on-error: true

      - name: Generate performance report
        run: |
          cat > performance-report.md << 'EOF'
          # 📊 E2E Test Performance Report

          Generated: $(date)

          ## Test Execution Summary

          | Suite | Tests | Status |
          |-------|-------|--------|
          | comprehensive-ui-integration | 64 | ✅ |
          | complete-feature-coverage | 28 | ✅ |
          | edge-cases-and-failures | 70 | ✅ |
          | security-session-auth | 88 | ✅ |
          | **Total** | **250+** | **✅** |

          ## Recommendations
          - All test suites passing
          - No performance regressions detected
          - Secure and stable release candidate
          EOF

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.md
          retention-days: 90
        continue-on-error: true
