name: Coverage Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # CI-10 (see test.yml): install the package with its real base deps +
        # dev extra instead of a hand-maintained pip list — that list had
        # drifted, silently omitting the package itself (breaking every
        # corvin_console/corvin_license import), the `limits` rate-limiting
        # lib (operator/license/validator.py imports it directly), the
        # `hatchling` build backend (needed by tests/test_hatch_build_vendor_
        # ignore.py), and `python-multipart` (FastAPI form-data test routes).
        run: |
          pip install -e ".[dev]" hatchling limits python-multipart

      - name: Run tests with coverage
        run: |
          # --import-mode=importlib: core/compute/tests/__init__.py makes that
          # dir a package, but core/compute/ itself has no __init__.py, so
          # pytest's default "prepend" import mode resolves its fully-
          # qualified module names as `tests.<name>` — the same top-level
          # name the repo-root tests/ package already owns. Whichever loads
          # first wins sys.modules["tests"], and every file under the other
          # tests/ dir then fails collection with
          # "ModuleNotFoundError: No module named 'tests.<name>'".
          # importlib mode keys modules by file path instead of by short
          # package name, so the two same-named `tests/` dirs stop colliding.
          pytest \
            tests/ \
            operator/bridges/shared/ \
            core/console/tests/ \
            core/compute/tests/ \
            --import-mode=importlib \
            --cov=operator \
            --cov=core \
            --cov-report=term-missing:skip-covered \
            --cov-report=html \
            --cov-fail-under=75 \
            -v

      - name: Generate coverage badge
        run: |
          # CI-3: write to .coverage.json — the name every reader step below
          # expects. `coverage json` defaults to coverage.json (no dot), so the
          # badge/comment/threshold steps were all reading a file that never
          # existed and silently fell into their except branches.
          coverage json --quiet -o .coverage.json
          python3 << 'EOF'
          import json
          import sys

          try:
            with open('.coverage.json', 'r') as f:
              data = json.load(f)
              coverage_pct = data.get('totals', {}).get('percent_covered', 0)

              # Determine badge color
              if coverage_pct >= 90:
                color = 'brightgreen'
              elif coverage_pct >= 80:
                color = 'green'
              elif coverage_pct >= 70:
                color = 'yellowgreen'
              elif coverage_pct >= 60:
                color = 'yellow'
              else:
                color = 'red'

              print(f"Coverage: {coverage_pct:.1f}%")
              print(f"Color: {color}")
          except:
            print("Coverage: unknown")
          EOF
        continue-on-error: true

      - name: Comment PR with coverage report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const coverage = JSON.parse(fs.readFileSync('.coverage.json', 'utf8'));
              const pct = coverage.totals.percent_covered.toFixed(1);

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📊 Coverage Report\n\n**Overall Coverage:** ${pct}%\n\n[View detailed report →](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`
              });
            } catch (e) {
              console.log('Could not parse coverage report:', e);
            }
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Check coverage thresholds
        run: |
          python3 << 'EOF'
          import json
          import sys

          # CI-3: fail-closed. A missing/malformed coverage file (e.g. the old
          # coverage.json/.coverage.json name mismatch) previously landed in a
          # "Warning" branch that still exited 0, so this gate could never fail.
          # It now exits non-zero on any error.
          #
          # NOTE: a per-module CRITICAL_THRESHOLDS map used to be defined here
          # but was never wired to any check (dead code). Removed rather than
          # left dangling; the enforced gate is the overall 75% floor below
          # (which also matches --cov-fail-under=75 in the pytest step).
          try:
            with open('.coverage.json', 'r') as f:
              data = json.load(f)
            overall = data.get('totals', {}).get('percent_covered', 0)
            print(f"Overall coverage: {overall:.1f}%")
            if overall < 75:
              print(f"✗ Coverage below 75% threshold: {overall:.1f}%")
              sys.exit(1)
            print("✓ Coverage meets 75% threshold")
          except SystemExit:
            raise
          except Exception as e:
            print(f"✗ Could not validate coverage thresholds: {e}")
            sys.exit(1)
          EOF
