name: Sync installers to Corvin-Website

# Runs on every push to main that touches either installer script.
# Copies install.ps1 and install.sh into the CorvinLabs/Corvin-Website repo
# so that irm corvin-labs.com/install.ps1 | iex always serves the latest
# version without a manual wrangler deploy.
#
# Required secret: CORVIN_WEBSITE_PAT
#   A GitHub fine-grained PAT (or classic PAT) with Contents: write access
#   to CorvinLabs/Corvin-Website.  Set it in:
#   CorvinOS repo → Settings → Secrets → Actions → New repository secret.

on:
  push:
    branches: [main]
    paths:
      - install.ps1
      - install.sh

jobs:
  sync:
    name: Push installers to Corvin-Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CorvinOS
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout Corvin-Website
        uses: actions/checkout@v4
        with:
          repository: CorvinLabs/Corvin-Website
          token: ${{ secrets.CORVIN_WEBSITE_PAT }}
          path: corvin-website

      - name: Copy installer scripts
        run: |
          cp install.ps1 corvin-website/install.ps1
          cp install.sh  corvin-website/install.sh

      - name: Commit + push (if changed)
        working-directory: corvin-website
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.ps1 install.sh
          if git diff --cached --quiet; then
            echo "No installer changes — nothing to push."
          else
            COMMIT=$(git -C .. rev-parse --short HEAD)
            git commit -m "chore: sync installers from CorvinOS@${COMMIT}"
            git push
          fi
