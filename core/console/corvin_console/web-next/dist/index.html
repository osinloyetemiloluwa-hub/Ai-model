<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Corvin — your personal operator workshop." />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/svg+xml" href="/console/favicon.svg" />
    <title>Corvin — Corvin</title>
    <!--
      Web fonts (Inter + Fraunces) are SELF-HOSTED, not loaded from a CDN.
      The woff2 files ship inside the bundle via the @fontsource-variable
      packages imported in src/main.tsx, so the console makes NO request to
      Google Fonts / rsms.me / any third-party CDN on load. This is a hard
      requirement for the zero-egress / air-gapped on-premise EU deployment:
      an external font request would beacon the client's IP on every page
      load. Until the woff2 is decoded the UI renders with the system-font
      fallback in the Tailwind font stack (tailwind.config.ts → fontFamily)
      and upgrades in place (font-display: swap). Do NOT reintroduce an
      external <link> to fonts.googleapis.com / fonts.gstatic.com / rsms.me.
    -->
    <!--
      FOUC-prevention: pick the theme before the React bundle loads.
      Mirrors the legacy console's behaviour.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("corvin-theme");
          // One-time migration (v0.9.91): switch users who have the old "light"
          // or "auto" default to "dark". Only runs once per browser profile
          // (marker key). Users who explicitly toggled their theme are not
          // affected — handleToggle sets the same marker key before cycling.
          if (!localStorage.getItem("corvin-dark-default-v2")) {
            localStorage.setItem("corvin-dark-default-v2", "1");
            if (!stored || stored === "light" || stored === "auto") {
              stored = "dark";
              localStorage.setItem("corvin-theme", "dark");
            }
          }
          stored = stored || "dark";
          var theme = stored;
          if (stored === "auto") {
            var mql = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)");
            theme = mql && mql.matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
