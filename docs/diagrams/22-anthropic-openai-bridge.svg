<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>ADR-0181 M3 — local translating proxy for provider-based Claude Code routing</title>
  <desc>Placeholder diagram (docs/claude-ref/testing-and-docs.md "Creating New Diagrams" convention).
  Claude Code only speaks the Anthropic Messages API. When a tenant assigns OpenRouter or Ollama to
  the claude_code engine, adapter.py::_build_spawn_env starts a local ThreadingHTTPServer
  (operator/bridges/shared/anthropic_openai_bridge.py, ensure_proxy()) on 127.0.0.1 that translates
  POST /v1/messages (Anthropic, incl. SSE streaming) to POST /chat/completions (OpenAI-compatible)
  and back, then points ANTHROPIC_BASE_URL at it. See docs/claude-ref/layer-engines.md
  "ADR-0181 M3" section for the full write-up; refine this diagram with a real flow illustration
  as a follow-up.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="340" fill="#0f172a"/>
  <text x="450" y="34" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">
    ADR-0181 M3 — local translating proxy (placeholder)
  </text>

  <rect x="40" y="120" width="180" height="70" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="130" y="150" text-anchor="middle" fill="#e2e8f0" font-size="14">claude CLI</text>
  <text x="130" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">Anthropic Messages API</text>

  <line x1="220" y1="155" x2="330" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="330" y="100" width="240" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">
    anthropic_openai_bridge.py
  </text>
  <text x="450" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">
    ensure_proxy() — 127.0.0.1:port
  </text>
  <text x="450" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">
    ThreadingHTTPServer, per (url, model,
  </text>
  <text x="450" y="184" text-anchor="middle" fill="#94a3b8" font-size="11">
    key, disable_reasoning) singleton
  </text>

  <line x1="570" y1="155" x2="680" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="680" y="120" width="180" height="70" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="150" text-anchor="middle" fill="#e2e8f0" font-size="14">OpenRouter / Ollama</text>
  <text x="770" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">OpenAI Chat Completions</text>

  <text x="450" y="250" text-anchor="middle" fill="#64748b" font-size="12">
    Full write-up: docs/claude-ref/layer-engines.md "ADR-0181 M3" section
  </text>
  <text x="450" y="270" text-anchor="middle" fill="#64748b" font-size="12">
    Placeholder per testing-and-docs.md convention — refine with a real flow illustration later
  </text>
</svg>
