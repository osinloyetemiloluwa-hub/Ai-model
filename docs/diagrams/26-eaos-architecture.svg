<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>EAOS Architecture — Engine-Agnostic OS Shell (ADR-0069)</title>
  <desc>ADR-0069 EAOS full architecture. Top: five engines. Middle: ECI layer (EngineCommandManifest,
  CommandDispatcher, SkillCompiler). Bottom: Adapter routes to Forge MCP Server where Tool Execution
  Broker enforces L10 path-gate, L16 audit, and L33 artifact registration for every tool call,
  regardless of engine. Hermes reaches MCP tools via the Function-Call Bridge (FCB).
  CopilotCliEngine (ADR-0071) is worker-only, /btw=None, locality=us_cloud.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────────── -->
  <text x="690" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">EAOS — Engine-Agnostic OS Shell</text>
  <text x="690" y="46" text-anchor="middle" font-size="11" fill="#64748b">ADR-0069 · All engines share L10 path-gate · L16 audit · L33 artifacts via Tool Execution Broker</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 1 — Five engines
  ════════════════════════════════════════════════════════════════════ -->

  <!-- ClaudeCode -->
  <rect x="20" y="65" width="230" height="115" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">ClaudeCodeEngine</text>
  <text x="135" y="102" text-anchor="middle" font-size="9" fill="#1d4ed8">DEFAULT  ·  spawn via subprocess</text>
  <line x1="36" y1="110" x2="234" y2="110" stroke="#2563eb" stroke-width="0.8"/>
  <text x="36" y="124" font-size="9" font-family="'Courier New', monospace" fill="#1e3a8a">/btw   → stdin_json (live)</text>
  <text x="36" y="138" font-size="9" font-family="'Courier New', monospace" fill="#1e3a8a">hooks  → native (PreToolUse)</text>
  <text x="36" y="152" font-size="9" font-family="'Courier New', monospace" fill="#1e3a8a">MCP    → native</text>
  <text x="36" y="166" font-size="9" font-family="'Courier New', monospace" fill="#1e3a8a">plan   → ✓  compact → ✓</text>

  <!-- Codex -->
  <rect x="280" y="65" width="230" height="115" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="395" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">CodexCliEngine</text>
  <text x="395" y="102" text-anchor="middle" font-size="9" fill="#6d28d9">opt-in  ·  spawn via subprocess</text>
  <line x1="296" y1="110" x2="494" y2="110" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="296" y="124" font-size="9" font-family="'Courier New', monospace" fill="#4c1d95">/btw   → None (explicit error)</text>
  <text x="296" y="138" font-size="9" font-family="'Courier New', monospace" fill="#4c1d95">hooks  → TEB (ADR-0069)</text>
  <text x="296" y="152" font-size="9" font-family="'Courier New', monospace" fill="#4c1d95">MCP    → native</text>
  <text x="296" y="166" font-size="9" font-family="'Courier New', monospace" fill="#4c1d95">plan   → ✗  compact → ✗</text>

  <!-- OpenCode -->
  <rect x="540" y="65" width="230" height="115" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="655" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">OpenCodeEngine</text>
  <text x="655" y="102" text-anchor="middle" font-size="9" fill="#047857">provider-agnostic  ·  subprocess</text>
  <line x1="556" y1="110" x2="754" y2="110" stroke="#059669" stroke-width="0.8"/>
  <text x="556" y="124" font-size="9" font-family="'Courier New', monospace" fill="#064e3b">/btw   → None (explicit error)</text>
  <text x="556" y="138" font-size="9" font-family="'Courier New', monospace" fill="#064e3b">hooks  → TEB (ADR-0069)</text>
  <text x="556" y="152" font-size="9" font-family="'Courier New', monospace" fill="#064e3b">MCP    → native</text>
  <text x="556" y="166" font-size="9" font-family="'Courier New', monospace" fill="#064e3b">/e:model → _override_model</text>

  <!-- Hermes -->
  <rect x="800" y="65" width="280" height="115" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="940" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">HermesEngine</text>
  <text x="940" y="102" text-anchor="middle" font-size="9" fill="#c2410c">Ollama HTTP  ·  L34 CONFIDENTIAL</text>
  <line x1="816" y1="110" x2="1064" y2="110" stroke="#ea580c" stroke-width="0.8"/>
  <text x="816" y="124" font-size="9" font-family="'Courier New', monospace" fill="#7c2d12">/btw   → buffered → next turn</text>
  <text x="816" y="138" font-size="9" font-family="'Courier New', monospace" fill="#7c2d12">hooks  → TEB (ADR-0069)</text>
  <text x="816" y="152" font-size="9" font-family="'Courier New', monospace" fill="#7c2d12">MCP    → FCB-bridged</text>
  <text x="816" y="166" font-size="9" font-family="'Courier New', monospace" fill="#7c2d12">/e:model /e:temp /e:ctx</text>

  <!-- CopilotCli -->
  <rect x="1090" y="65" width="270" height="115" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="1225" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">CopilotCliEngine</text>
  <text x="1225" y="102" text-anchor="middle" font-size="9" fill="#be185d">worker-only  ·  ADR-0071  ·  copilot -p</text>
  <line x1="1106" y1="110" x2="1344" y2="110" stroke="#db2777" stroke-width="0.8"/>
  <text x="1106" y="124" font-size="9" font-family="'Courier New', monospace" fill="#831843">/btw   → None (explicit error)</text>
  <text x="1106" y="138" font-size="9" font-family="'Courier New', monospace" fill="#831843">hooks  → TEB (ADR-0069)</text>
  <text x="1106" y="152" font-size="9" font-family="'Courier New', monospace" fill="#831843">locality → us_cloud</text>
  <text x="1106" y="166" font-size="9" font-family="'Courier New', monospace" fill="#831843">model: shell/git/gh/None</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 2 — ECI layer
  ════════════════════════════════════════════════════════════════════ -->

  <!-- Arrows engine → ECI -->
  <line x1="135" y1="180" x2="135" y2="210" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="395" y1="180" x2="395" y2="210" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="655" y1="180" x2="655" y2="210" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="940" y1="180" x2="940" y2="210" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="1225" y1="180" x2="1225" y2="210" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ECI outer wrapper -->
  <rect x="20" y="210" width="1340" height="135" rx="12" fill="#f0fdf4" stroke="#65a30d" stroke-width="2"/>
  <text x="690" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Engine Command Interface (ECI)  —  ADR-0069 M6</text>

  <!-- EngineCommandManifest box -->
  <rect x="36" y="242" width="300" height="88" rx="8" fill="#65a30d" opacity="0.9"/>
  <text x="186" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">EngineCommandManifest</text>
  <text x="186" y="275" text-anchor="middle" font-size="9" fill="#d9f99d">declared by each engine as a property</text>
  <line x1="52" y1="282" x2="320" y2="282" stroke="#d9f99d" stroke-width="0.8"/>
  <text x="52" y="295" font-size="9" font-family="'Courier New', monospace" fill="#fff">mid_stream_inject: str|None</text>
  <text x="52" y="308" font-size="9" font-family="'Courier New', monospace" fill="#fff">cancel / compact: str|None</text>
  <text x="52" y="321" font-size="9" font-family="'Courier New', monospace" fill="#fff">native_commands: dict[name→spec]</text>

  <!-- CommandDispatcher box -->
  <rect x="356" y="242" width="320" height="88" rx="8" fill="#166534" opacity="0.9"/>
  <text x="516" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">CommandDispatcher</text>
  <text x="516" y="275" text-anchor="middle" font-size="9" fill="#d9f99d">stateless — reads manifest, routes /btw + /e:</text>
  <line x1="372" y1="282" x2="660" y2="282" stroke="#d9f99d" stroke-width="0.8"/>
  <text x="372" y="295" font-size="9" font-family="'Courier New', monospace" fill="#fff">stdin_json → engine.inject(text)</text>
  <text x="372" y="308" font-size="9" font-family="'Courier New', monospace" fill="#fff">buffered   → _btw_buffers[chat] ← text</text>
  <text x="372" y="321" font-size="9" font-family="'Courier New', monospace" fill="#fff">None       → user feedback (explicit error)</text>

  <!-- SkillCompiler box -->
  <rect x="696" y="242" width="368" height="88" rx="8" fill="#7c3aed" opacity="0.85"/>
  <text x="880" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SkillCompiler  +  drain_btw_buffer()</text>
  <text x="880" y="275" text-anchor="middle" font-size="9" fill="#ede9fe">called at spawn time inside _resolve_spawn_inputs()</text>
  <line x1="712" y1="282" x2="1048" y2="282" stroke="#ede9fe" stroke-width="0.8"/>
  <text x="712" y="295" font-size="9" font-family="'Courier New', monospace" fill="#fff">collect_active_skills() → compile(engine_id)</text>
  <text x="712" y="308" font-size="9" font-family="'Courier New', monospace" fill="#fff">drain_btw_buffer() → prepend to system prompt</text>
  <text x="712" y="321" font-size="9" font-family="'Courier New', monospace" fill="#fff">all engines: system-prompt &lt;auto_skill&gt; format</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 3 — Adapter
  ════════════════════════════════════════════════════════════════════ -->

  <line x1="690" y1="345" x2="690" y2="372" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="460" y="372" width="460" height="65" rx="10" fill="#0f172a"/>
  <text x="690" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">ADAPTER</text>
  <text x="690" y="411" text-anchor="middle" font-size="10" fill="#cbd5e1">_resolve_spawn_inputs()  ·  call_claude_streaming()</text>
  <text x="690" y="425" text-anchor="middle" font-size="9" fill="#94a3b8">L34 data-classification gate  ·  L35 egress gate  ·  CORVIN_ENGINE_ID → env</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 4 — Forge MCP Server + TEB
  ════════════════════════════════════════════════════════════════════ -->

  <line x1="690" y1="437" x2="690" y2="465" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Forge MCP Server outer -->
  <rect x="20" y="465" width="1340" height="185" rx="14" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="690" y="489" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Forge MCP Server  (JSON-RPC 2.0)</text>
  <text x="690" y="505" text-anchor="middle" font-size="10" fill="#b91c1c">MCPServer.__init__: reads CORVIN_ENGINE_ID · builds ToolExecutionBroker with path_gate_pre_hook</text>

  <!-- TEB big box -->
  <rect x="36" y="517" width="680" height="118" rx="10" fill="#dc2626"/>
  <text x="376" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Tool Execution Broker (TEB)  —  ADR-0069 M1</text>
  <text x="376" y="553" text-anchor="middle" font-size="10" fill="#fecaca">every _call_forged() routes through broker.execute(executor=_scoped_executor)</text>

  <!-- Pre-hook -->
  <rect x="52" y="562" width="190" height="60" rx="8" fill="#7f1d1d"/>
  <text x="147" y="578" text-anchor="middle" font-size="10" font-weight="700" fill="#fef2f2">pre-hook</text>
  <text x="147" y="592" text-anchor="middle" font-size="9" fill="#fecaca">path_gate_pre_hook(ctx)</text>
  <text x="147" y="605" text-anchor="middle" font-size="9" fill="#fecaca">L10 fail-closed (all tools)</text>
  <text x="147" y="618" text-anchor="middle" font-size="9" fill="#fecaca">emit path_gate.denied if hit</text>

  <!-- Execute -->
  <rect x="262" y="562" width="190" height="60" rx="8" fill="#7f1d1d"/>
  <text x="357" y="578" text-anchor="middle" font-size="10" font-weight="700" fill="#fef2f2">execute</text>
  <text x="357" y="592" text-anchor="middle" font-size="9" fill="#fecaca">_scoped_executor closure</text>
  <text x="357" y="605" text-anchor="middle" font-size="9" fill="#fecaca">run_tool(registry, name, args)</text>
  <text x="357" y="618" text-anchor="middle" font-size="9" fill="#fecaca">thread-safe per call</text>

  <!-- Post-hooks -->
  <rect x="472" y="562" width="230" height="60" rx="8" fill="#7f1d1d"/>
  <text x="587" y="578" text-anchor="middle" font-size="10" font-weight="700" fill="#fef2f2">post-hooks</text>
  <text x="587" y="592" text-anchor="middle" font-size="9" fill="#fecaca">audit emit → L16 hash chain</text>
  <text x="587" y="605" text-anchor="middle" font-size="9" fill="#fecaca">artifact_broker → L33 register</text>
  <text x="587" y="618" text-anchor="middle" font-size="9" fill="#fecaca">failures: log + audit event (not fail)</text>

  <!-- Arrows between TEB stages -->
  <line x1="242" y1="592" x2="262" y2="592" stroke="#fecaca" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="452" y1="592" x2="472" y2="592" stroke="#fecaca" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- FCB box (right side of Forge) -->
  <rect x="736" y="517" width="328" height="118" rx="10" fill="#d97706"/>
  <text x="900" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Function-Call Bridge (FCB)</text>
  <text x="900" y="553" text-anchor="middle" font-size="10" fill="#fef3c7">teb/fcb.py  —  ADR-0069 M2</text>
  <text x="900" y="572" text-anchor="middle" font-size="9" fill="#fff">mcp_tools_to_openai_list()  → Hermes tools= param</text>
  <text x="900" y="586" text-anchor="middle" font-size="9" fill="#fff">openai_call_to_mcp_call() + mcp_result_to_openai_msg()</text>
  <text x="900" y="600" text-anchor="middle" font-size="9" fill="#fef3c7">HermesEngine tool-use loop (max 8 rounds):</text>
  <text x="900" y="614" text-anchor="middle" font-size="9" fill="#fef3c7">model→tool_call → FCB → TEB → result → messages</text>
  <text x="900" y="628" text-anchor="middle" font-size="9" fill="#fef3c7">re-POST to Ollama until done=true, no tool_calls</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 5 — Corvin Layers guaranteed
  ════════════════════════════════════════════════════════════════════ -->

  <line x1="205" y1="650" x2="205" y2="680" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <line x1="690" y1="650" x2="690" y2="680" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <line x1="1160" y1="650" x2="1160" y2="680" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arr-red)"/>

  <rect x="20" y="680" width="370" height="65" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="205" y="700" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">L10 — Path-Gate</text>
  <text x="205" y="714" text-anchor="middle" font-size="10" fill="#92400e">fail-closed · all engines · all tools</text>
  <text x="205" y="728" text-anchor="middle" font-size="9" fill="#78350f">audit.jsonl · policy.json · forge/ protected</text>

  <rect x="410" y="680" width="560" height="65" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="690" y="700" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">L16 + L33 — Audit &amp; Artifacts</text>
  <text x="690" y="714" text-anchor="middle" font-size="10" fill="#92400e">hash-chained audit · tool_call.start/done events</text>
  <text x="690" y="728" text-anchor="middle" font-size="9" fill="#78350f">artifact registration on Write/Edit (best-effort async)</text>

  <rect x="990" y="680" width="370" height="65" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="1175" y="700" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">L34 + L35 — Data Class. &amp; Egress</text>
  <text x="1175" y="714" text-anchor="middle" font-size="10" fill="#92400e">pre-spawn gates · engine compliance matrix</text>
  <text x="1175" y="728" text-anchor="middle" font-size="9" fill="#78350f">Hermes: locality=local, network_egress=none</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       Footer
  ════════════════════════════════════════════════════════════════════ -->
  <text x="690" y="780" text-anchor="middle" font-size="10" fill="#94a3b8">Before ADR-0069: L10 / L16 / L33 were ClaudeCode-only (via native PreToolUse hooks)</text>
  <text x="690" y="796" text-anchor="middle" font-size="10" fill="#94a3b8">After ADR-0069: all engines receive identical guarantees — engine swap does not weaken security posture</text>

  <!-- Before/After indicators -->
  <rect x="310" y="808" width="200" height="22" rx="5" fill="#fee2e2"/>
  <text x="410" y="823" text-anchor="middle" font-size="10" fill="#991b1b">Before: only ██ CC had guarantees</text>
  <rect x="870" y="808" width="200" height="22" rx="5" fill="#dcfce7"/>
  <text x="970" y="823" text-anchor="middle" font-size="10" fill="#166534">After: ██████████ all engines covered</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#059669"/>
      <stop offset="60%" stop-color="#ea580c"/>
      <stop offset="80%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <rect x="490" y="845" width="400" height="6" rx="3" fill="url(#grad)" opacity="0.6"/>
  <text x="690" y="862" text-anchor="middle" font-size="9" fill="#94a3b8">CC · Codex · OpenCode · Hermes · TEB · Copilot</text>
</svg>
