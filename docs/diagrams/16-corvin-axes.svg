<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>The five orthogonal axes of Corvin</title>
  <desc>Five horizontal axis bands stacked vertically. Each band lists its values left-to-right with one-line semantics. From bottom to top: tenant (multi-tenant boundary), scope (lifetime axis), persona (role axis), engine (LLM-execution axis), surface (channel axis). All five compose orthogonally — any combination is a valid runtime configuration.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The five orthogonal axes of Corvin</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#64748b">Any (tenant × scope × persona × engine × surface) tuple is a valid runtime configuration. Axes are independently dimensioned.</text>

  <!-- Axis 5 — Surface (top) -->
  <rect x="40" y="86" width="920" height="96" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="58" y="108" font-size="12" font-weight="700" fill="#92400e">5 · SURFACE — where the user lives</text>
  <text x="58" y="126" font-size="10.5" fill="#78350f">Bridges per channel. Each ships its own daemon and inbox-poll loop; adapter is shared.</text>
  <g font-size="10.5" fill="#0f172a">
    <rect x="58"  y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="106" y="149" text-anchor="middle">WhatsApp</text>
    <rect x="162" y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="210" y="149" text-anchor="middle">Telegram</text>
    <rect x="266" y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="314" y="149" text-anchor="middle">Discord</text>
    <rect x="370" y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="418" y="149" text-anchor="middle">Slack</text>
    <rect x="474" y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="522" y="149" text-anchor="middle">Email (IMAP)</text>
    <rect x="578" y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="626" y="149" text-anchor="middle">Teams</text>
    <rect x="682" y="136" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="730" y="149" text-anchor="middle">Signal</text>
    <rect x="58"  y="160" width="96"  height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="106" y="173" text-anchor="middle">Voice (TTS)</text>
    <rect x="162" y="160" width="180" height="18" rx="4" fill="#fffbeb" stroke="#d97706"/><text x="252" y="173" text-anchor="middle">REST/SSE/gRPC (gateway)</text>
  </g>

  <!-- Axis 4 — Engine -->
  <rect x="40" y="200" width="920" height="76" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="58" y="222" font-size="12" font-weight="700" fill="#1e3a8a">4 · ENGINE — the LLM execution layer</text>
  <text x="58" y="240" font-size="10.5" fill="#1e3a8a">WorkerEngine Protocol. Adapter routes per-call. Default is Claude Code; Hermes (local Ollama), Copilot CLI (worker-only), OpenCode opt-in per persona.</text>
  <g font-size="10.5" fill="#0f172a">
    <rect x="58"  y="252" width="148" height="18" rx="4" fill="#eff6ff" stroke="#2563eb"/><text x="132" y="265" text-anchor="middle">Claude Code (default)</text>
    <rect x="214" y="252" width="96"  height="18" rx="4" fill="#eff6ff" stroke="#2563eb"/><text x="262" y="265" text-anchor="middle">Codex CLI</text>
    <rect x="318" y="252" width="152" height="18" rx="4" fill="#eff6ff" stroke="#2563eb"/><text x="394" y="265" text-anchor="middle">OpenCode (local/cloud)</text>
    <rect x="478" y="252" width="152" height="18" rx="4" fill="#eff6ff" stroke="#2563eb"/><text x="554" y="265" text-anchor="middle">Hermes (Ollama local)</text>
    <rect x="638" y="252" width="164" height="18" rx="4" fill="#eff6ff" stroke="#2563eb"/><text x="720" y="265" text-anchor="middle">Copilot CLI (worker-only)</text>
    <rect x="810" y="252" width="100" height="18" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-dasharray="3,2"/><text x="860" y="265" text-anchor="middle">future engines</text>
  </g>

  <!-- Axis 3 — Persona -->
  <rect x="40" y="294" width="920" height="76" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="58" y="316" font-size="12" font-weight="700" fill="#5b21b6">3 · PERSONA — the agent's role for this chat</text>
  <text x="58" y="334" font-size="10.5" fill="#4c1d95">Auto-routed (heuristic / embedding) OR explicit /persona pin. Each carries its own tools, MCP servers, sandbox policy, append_system, LDD preset.</text>
  <g font-size="11" fill="#0f172a">
    <rect x="58"  y="346" width="92" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="104" y="359" text-anchor="middle">coder</text>
    <rect x="162" y="346" width="92" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="208" y="359" text-anchor="middle">forge</text>
    <rect x="266" y="346" width="92" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="312" y="359" text-anchor="middle">browser</text>
    <rect x="370" y="346" width="92" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="416" y="359" text-anchor="middle">research</text>
    <rect x="474" y="346" width="92" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="520" y="359" text-anchor="middle">inbox</text>
    <rect x="578" y="346" width="92" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="624" y="359" text-anchor="middle">jarvis</text>
    <rect x="682" y="346" width="120" height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="742" y="359" text-anchor="middle">local-coder</text>
    <rect x="814" y="346" width="96"  height="18" rx="4" fill="#f5f3ff" stroke="#7c3aed"/><text x="862" y="359" text-anchor="middle">+ user-defined</text>
  </g>

  <!-- Axis 2 — Scope -->
  <rect x="40" y="388" width="920" height="76" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="58" y="410" font-size="12" font-weight="700" fill="#14532d">2 · SCOPE — the persistence axis</text>
  <text x="58" y="428" font-size="10.5" fill="#166534">Forge tools + skills + audit chain are scoped. Promotion ladder lifts artifacts toward longer survival; auto-purge enforces the inverse.</text>
  <g font-size="11" fill="#0f172a">
    <rect x="58"  y="440" width="200" height="18" rx="4" fill="#f0fdf4" stroke="#16a34a"/><text x="158" y="453" text-anchor="middle">task — single run, TTL purged</text>
    <rect x="270" y="440" width="200" height="18" rx="4" fill="#f0fdf4" stroke="#16a34a"/><text x="370" y="453" text-anchor="middle">session — chat lifetime</text>
    <rect x="482" y="440" width="200" height="18" rx="4" fill="#f0fdf4" stroke="#16a34a"/><text x="582" y="453" text-anchor="middle">project — repo-pinned</text>
    <rect x="694" y="440" width="216" height="18" rx="4" fill="#f0fdf4" stroke="#16a34a"/><text x="802" y="453" text-anchor="middle">user — every chat, never auto-purged</text>
  </g>
  <!-- promotion arrow -->
  <line x1="160" y1="466" x2="800" y2="466" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar)"/>
  <text x="480" y="462" text-anchor="middle" font-size="9.5" fill="#166534">promotion ladder (gated by grades · /tool save · operator force)</text>

  <!-- Axis 1 — Tenant -->
  <rect x="40" y="482" width="920" height="76" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="58" y="504" font-size="12" font-weight="700" fill="#7f1d1d">1 · TENANT — the isolation boundary (ADR-0007)</text>
  <text x="58" y="522" font-size="10.5" fill="#991b1b">Per-tenant chain, vault, OIDC trust, SCIM store. Single-operator path = implicit `_default`. Cross-tenant audit fusion is structurally impossible.</text>
  <g font-size="11" fill="#0f172a">
    <rect x="58"  y="534" width="200" height="18" rx="4" fill="#fef2f2" stroke="#dc2626"/><text x="158" y="547" text-anchor="middle">_default (single-operator)</text>
    <rect x="270" y="534" width="200" height="18" rx="4" fill="#fef2f2" stroke="#dc2626"/><text x="370" y="547" text-anchor="middle">acme  (per-tenant tree)</text>
    <rect x="482" y="534" width="200" height="18" rx="4" fill="#fef2f2" stroke="#dc2626"/><text x="582" y="547" text-anchor="middle">globex (per-tenant tree)</text>
    <rect x="694" y="534" width="216" height="18" rx="4" fill="#fef2f2" stroke="#dc2626"/><text x="802" y="547" text-anchor="middle">… provisioned via gateway</text>
  </g>

  <!-- Bottom — backbone -->
  <rect x="40" y="576" width="920" height="44" rx="10" fill="#0f172a"/>
  <text x="58" y="600" font-size="12" font-weight="700" fill="#f8fafc">↓  THE BACKBONE  ↓</text>
  <text x="220" y="600" font-size="11" fill="#cbd5e1">unified hash-chain audit log · runs through ALL FIVE axes · offline-verifiable · tamper-evident</text>
</svg>
