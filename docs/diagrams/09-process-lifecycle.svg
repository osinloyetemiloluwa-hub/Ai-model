<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Process lifecycle — bash fork/exec vs Corvin adapter</title>
  <desc>Two parallel timelines stacked. Top: a bash shell process that forks and execs three commands sequentially, with the parent waiting between forks. Bottom: the Corvin adapter loop spawning three claude subprocesses in response to three inbox messages, each running a full conversation turn before exiting and the adapter writing the outbox file. Annotations show the matching steps: fork = subprocess.run start, exec = the claude binary running, wait = adapter blocking on subprocess.run, exit = JSONL stream end.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Process lifecycle — bash fork/exec vs the Corvin adapter</text>
  <text x="550" y="52" text-anchor="middle" font-size="12" fill="#475569">Same shape: parent loops, child runs to completion, parent collects exit, parent loops. Different paint, identical mechanism.</text>

  <!-- Top half: bash shell timeline -->
  <rect x="40" y="80" width="1020" height="200" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="105" font-size="13" font-weight="700" fill="#0f172a">Linux — bash shell handling three commands</text>

  <!-- Parent timeline (bash) -->
  <line x1="80" y1="155" x2="1040" y2="155" stroke="#0f172a" stroke-width="2"/>
  <text x="60" y="160" text-anchor="end" font-size="11" font-weight="700" fill="#0f172a">bash</text>

  <!-- Child A -->
  <rect x="180" y="180" width="170" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="265" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">cmd1 (e.g. ls)</text>
  <text x="265" y="216" text-anchor="middle" font-size="9" fill="#0f172a">fork → exec → exit</text>
  <line x1="180" y1="180" x2="160" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="350" y1="180" x2="370" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="170" y="173" font-size="9" fill="#3b82f6">fork()</text>
  <text x="360" y="173" font-size="9" fill="#3b82f6">wait()</text>

  <!-- Child B -->
  <rect x="450" y="180" width="170" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="535" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">cmd2 (e.g. grep)</text>
  <text x="535" y="216" text-anchor="middle" font-size="9" fill="#0f172a">fork → exec → exit</text>
  <line x1="450" y1="180" x2="430" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="620" y1="180" x2="640" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Child C -->
  <rect x="720" y="180" width="170" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="805" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">cmd3 (e.g. python)</text>
  <text x="805" y="216" text-anchor="middle" font-size="9" fill="#0f172a">fork → exec → exit</text>
  <line x1="720" y1="180" x2="700" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="890" y1="180" x2="910" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Time axis bash -->
  <line x1="80" y1="252" x2="1040" y2="252" stroke="#94a3b8" stroke-width="1" marker-end="url(#ar)"/>
  <text x="80" y="270" font-size="9" fill="#94a3b8">prompt 1</text>
  <text x="350" y="270" font-size="9" fill="#94a3b8">prompt 2</text>
  <text x="620" y="270" font-size="9" fill="#94a3b8">prompt 3</text>
  <text x="910" y="270" font-size="9" fill="#94a3b8">prompt 4</text>
  <text x="1040" y="270" text-anchor="end" font-size="9" fill="#94a3b8">time →</text>

  <!-- Bottom half: Corvin timeline -->
  <rect x="40" y="300" width="1020" height="200" rx="10" fill="#cffafe" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <rect x="40" y="300" width="1020" height="200" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="60" y="325" font-size="13" font-weight="700" fill="#0e7490">Corvin — adapter handling three inbox messages</text>

  <!-- Parent timeline (adapter) -->
  <line x1="80" y1="375" x2="1040" y2="375" stroke="#0e7490" stroke-width="2"/>
  <text x="60" y="380" text-anchor="end" font-size="11" font-weight="700" fill="#0e7490">adapter</text>

  <!-- Child A: claude subprocess 1 -->
  <rect x="180" y="400" width="170" height="44" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="265" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">claude (msg 1)</text>
  <text x="265" y="436" text-anchor="middle" font-size="9" fill="#0f172a">spawn → reply → exit</text>
  <line x1="180" y1="400" x2="160" y2="375" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="350" y1="400" x2="370" y2="375" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="160" y="393" font-size="9" fill="#0e7490">subprocess.run()</text>
  <text x="360" y="393" font-size="9" fill="#0e7490">JSONL end</text>

  <!-- Child B -->
  <rect x="450" y="400" width="170" height="44" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="535" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">claude (msg 2)</text>
  <text x="535" y="436" text-anchor="middle" font-size="9" fill="#0f172a">fresh state, no leak from msg 1</text>
  <line x1="450" y1="400" x2="430" y2="375" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="620" y1="400" x2="640" y2="375" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Child C -->
  <rect x="720" y="400" width="170" height="44" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="805" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">claude (msg 3)</text>
  <text x="805" y="436" text-anchor="middle" font-size="9" fill="#0f172a">may forge a tool that survives</text>
  <line x1="720" y1="400" x2="700" y2="375" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="890" y1="400" x2="910" y2="375" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Time axis adapter -->
  <line x1="80" y1="472" x2="1040" y2="472" stroke="#94a3b8" stroke-width="1" marker-end="url(#ar)"/>
  <text x="80" y="490" font-size="9" fill="#94a3b8">inbox 1</text>
  <text x="350" y="490" font-size="9" fill="#94a3b8">outbox 1 + inbox 2</text>
  <text x="620" y="490" font-size="9" fill="#94a3b8">outbox 2 + inbox 3</text>
  <text x="910" y="490" font-size="9" fill="#94a3b8">outbox 3 + inbox 4</text>
  <text x="1040" y="490" text-anchor="end" font-size="9" fill="#94a3b8">time →</text>

  <!-- Footer -->
  <text x="550" y="538" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">
    The two timelines are mechanically identical. Differences: the bash child execs a binary on disk; the Corvin child can forge new "binaries" mid-conversation that the next subprocess will inherit via the registry.
  </text>
</svg>
