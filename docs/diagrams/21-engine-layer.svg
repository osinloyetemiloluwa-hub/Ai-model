  <text x="720" y="784" text-anchor="start" font-size="9" fill="#475569">compact: ✗</text>
  <text x="1010" y="784" text-anchor="start" font-size="9" fill="#475569">compact: ✗</text>

  <text x="45" y="798" text-anchor="start" font-size="9" fill="#475569">session_pinning: ✓</text>
  <text x="275" y="798" text-anchor="start" font-size="9" fill="#475569">session_pinning: ✗</text>
