<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Engine layer — five backends, one protocol, engine-agnostic OS guarantees (ADR-0069, ADR-0071)</title>
  <desc>Five WorkerEngine implementations share the WorkerEngine Protocol. Corvin adapts
  capabilities per engine: ClaudeCode (native full set), Codex/OpenCode (TEB-bridged), Hermes
  (TEB + FCB-bridged MCP, buffered /btw), CopilotCliEngine (worker-only, TEB-bridged, /btw=None,
  L34=us_cloud, ADR-0071). ADR-0069 EAOS ensures all engines receive L10/L16/L33
  guarantees through the Tool Execution Broker in the Forge MCP server.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────────── -->
  <text x="690" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Engine layer — one protocol, five backends, engine-agnostic OS guarantees</text>
  <text x="690" y="50" text-anchor="middle" font-size="11" fill="#64748b">ADR-0069 EAOS + ADR-0071: all engines share L10 path-gate · L16 audit · L33 artifacts via Tool Execution Broker</text>

  <!-- ── WorkerEngine Protocol ──────────────────────────────────────── -->
  <rect x="480" y="65" width="420" height="56" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="690" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">WorkerEngine Protocol  (Layer 22)</text>
  <text x="690" y="104" text-anchor="middle" font-size="10" fill="#78350f">spawn(prompt, *, env) → Iterator[StreamEvent]  ·  cancel()  ·  capabilities: dict  ·  command_manifest: EngineCommandManifest</text>

  <!-- ── Adapter ────────────────────────────────────────────────────── -->
  <line x1="690" y1="121" x2="690" y2="137" stroke="#d97706" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="520" y="137" width="340" height="70" rx="10" fill="#0f172a"/>
  <text x="690" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">ADAPTER</text>
  <text x="690" y="176" text-anchor="middle" font-size="10" fill="#cbd5e1">_resolve_spawn_inputs() → call_claude_streaming()</text>
  <text x="690" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">dispatches by profile.default_engine · runs L34/L35 gates before spawn</text>

  <!-- arrows from adapter to each engine -->
  <line x1="560" y1="207" x2="160" y2="238" stroke="#475569" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="600" y1="207" x2="380" y2="238" stroke="#475569" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="700" y1="207" x2="720" y2="238" stroke="#475569" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="750" y1="207" x2="940" y2="238" stroke="#475569" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="800" y1="207" x2="1200" y2="238" stroke="#475569" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ── ClaudeCodeEngine ───────────────────────────────────────────── -->
  <rect x="20" y="240" width="260" height="260" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ClaudeCodeEngine</text>
  <rect x="80" y="270" width="140" height="18" rx="4" fill="#2563eb"/>
  <text x="150" y="283" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">DEFAULT</text>
  <line x1="36" y1="296" x2="264" y2="296" stroke="#2563eb" stroke-width="1"/>
  <g font-size="10" font-family="'Courier New', monospace" fill="#1e3a8a">
    <text x="36" y="314">mid_stream_inject: stdin_json (live)</text>
    <text x="36" y="329">hooks:             native (PreToolUse)</text>
    <text x="36" y="344">skills_tool:       native (--tools)</text>
    <text x="36" y="359">mcp:               native</text>
    <text x="36" y="374">session_pinning:   True</text>
    <text x="36" y="389">plan_mode:         True</text>
    <text x="36" y="404">compact:           True (--compact)</text>
  </g>
  <line x1="36" y1="416" x2="264" y2="416" stroke="#2563eb" stroke-width="0.8"/>
  <text x="150" y="430" text-anchor="middle" font-size="10" fill="#1d4ed8">✓ native OS guarantees</text>
  <text x="150" y="444" text-anchor="middle" font-size="10" fill="#1d4ed8">TEB active (supplementary)</text>
  <text x="150" y="460" text-anchor="middle" font-size="9" fill="#3b82f6">spawns claude -p --output-format stream-json</text>
  <text x="150" y="474" text-anchor="middle" font-size="9" fill="#3b82f6">stdin pipe · /btw inject · hooks in CC</text>
  <text x="150" y="488" text-anchor="middle" font-size="9" fill="#3b82f6">ECI: command_manifest (stdin_json, /e:resume)</text>

  <!-- ── CodexCliEngine ─────────────────────────────────────────────── -->
  <rect x="295" y="240" width="260" height="260" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="425" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">CodexCliEngine</text>
  <text x="425" y="280" text-anchor="middle" font-size="10" fill="#6d28d9">opt-in via persona</text>
  <line x1="311" y1="290" x2="539" y2="290" stroke="#7c3aed" stroke-width="1"/>
  <g font-size="10" font-family="'Courier New', monospace" fill="#4c1d95">
    <text x="311" y="308">mid_stream_inject: None  → explicit error</text>
    <text x="311" y="323">hooks:             False (native)</text>
    <text x="311" y="338">skills_tool:       False</text>
    <text x="311" y="353">mcp:               True (native)</text>
    <text x="311" y="368">session_pinning:   False</text>
    <text x="311" y="383">plan_mode:         False</text>
    <text x="311" y="398">compact:           False</text>
  </g>
  <line x1="311" y1="410" x2="539" y2="410" stroke="#7c3aed" stroke-width="0.8"/>
  <rect x="335" y="418" width="180" height="16" rx="4" fill="#7c3aed"/>
  <text x="425" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">✓ TEB via Forge MCP (ADR-0069)</text>
  <text x="425" y="446" text-anchor="middle" font-size="10" fill="#5b21b6">L10 path-gate · L16 audit · L33 artifacts</text>
  <text x="425" y="462" text-anchor="middle" font-size="9" fill="#7c3aed">spawns codex exec --json --ephemeral</text>
  <text x="425" y="476" text-anchor="middle" font-size="9" fill="#7c3aed">ECI: command_manifest (mid_stream=None)</text>
  <text x="425" y="490" text-anchor="middle" font-size="9" fill="#7c3aed">/btw → "not supported" (explicit error)</text>

  <!-- ── OpenCodeEngine ─────────────────────────────────────────────── -->
  <rect x="570" y="240" width="260" height="260" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="700" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">OpenCodeEngine</text>
  <text x="700" y="280" text-anchor="middle" font-size="10" fill="#047857">provider-agnostic (Claude / OpenAI / Ollama)</text>
  <line x1="586" y1="290" x2="814" y2="290" stroke="#059669" stroke-width="1"/>
  <g font-size="10" font-family="'Courier New', monospace" fill="#064e3b">
    <text x="586" y="308">mid_stream_inject: None  → explicit error</text>
    <text x="586" y="323">hooks:             False (native)</text>
    <text x="586" y="338">skills_tool:       False</text>
    <text x="586" y="353">mcp:               True (native)</text>
    <text x="586" y="368">session_pinning:   False</text>
    <text x="586" y="383">_override_model:   /e:model sets this</text>
    <text x="586" y="398">plan_mode:         False</text>
  </g>
  <line x1="586" y1="410" x2="814" y2="410" stroke="#059669" stroke-width="0.8"/>
  <rect x="610" y="418" width="180" height="16" rx="4" fill="#059669"/>
  <text x="700" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">✓ TEB via Forge MCP (ADR-0069)</text>
  <text x="700" y="446" text-anchor="middle" font-size="10" fill="#065f46">L10 path-gate · L16 audit · L33 artifacts</text>
  <text x="700" y="462" text-anchor="middle" font-size="9" fill="#059669">spawns opencode run --format json</text>
  <text x="700" y="476" text-anchor="middle" font-size="9" fill="#059669">ECI: command_manifest (/e:model → override)</text>
  <text x="700" y="490" text-anchor="middle" font-size="9" fill="#059669">/btw → "not supported" (explicit error)</text>

  <!-- ── HermesEngine ───────────────────────────────────────────────── -->
  <rect x="845" y="240" width="240" height="260" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="965" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">HermesEngine</text>
  <text x="965" y="280" text-anchor="middle" font-size="10" fill="#c2410c">Ollama HTTP · L34 CONFIDENTIAL</text>
  <line x1="861" y1="290" x2="1069" y2="290" stroke="#ea580c" stroke-width="1"/>
  <g font-size="10" font-family="'Courier New', monospace" fill="#7c2d12">
    <text x="861" y="308">mid_stream_inject: buffered (ECI)</text>
    <text x="861" y="323">hooks:             False (native)</text>
    <text x="861" y="338">skills_tool:       False</text>
    <text x="861" y="353">mcp:               FCB-bridged</text>
    <text x="861" y="368">session_pinning:   False</text>
    <text x="861" y="383">_temperature:      /e:temp sets this</text>
    <text x="861" y="398">network_egress:    none (local)</text>
  </g>
  <line x1="861" y1="410" x2="1069" y2="410" stroke="#ea580c" stroke-width="0.8"/>
  <rect x="885" y="418" width="160" height="16" rx="4" fill="#ea580c"/>
  <text x="965" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">✓ TEB via Forge MCP (ADR-0069)</text>
  <text x="965" y="446" text-anchor="middle" font-size="10" fill="#9a3412">L10 · L16 · L33 · MCP via FCB</text>
  <text x="965" y="462" text-anchor="middle" font-size="9" fill="#ea580c">HTTP POST /api/chat · no subprocess</text>
  <text x="965" y="476" text-anchor="middle" font-size="9" fill="#ea580c">ECI: /e:model /e:temp /e:ctx</text>
  <text x="965" y="490" text-anchor="middle" font-size="9" fill="#ea580c">/btw queued → prepended next turn</text>

  <!-- ── CopilotCliEngine ──────────────────────────────────────────── -->
  <rect x="1105" y="240" width="250" height="260" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="1230" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">CopilotCliEngine</text>
  <text x="1230" y="280" text-anchor="middle" font-size="10" fill="#9d174d">worker-only · ADR-0071</text>
  <line x1="1121" y1="290" x2="1339" y2="290" stroke="#db2777" stroke-width="1"/>
  <g font-size="10" font-family="'Courier New', monospace" fill="#831843">
    <text x="1121" y="308">mid_stream_inject: None  (worker-only)</text>
    <text x="1121" y="323">hooks:             False (native)</text>
    <text x="1121" y="338">skills_tool:       False</text>
    <text x="1121" y="353">mcp:               None (no subprocess)</text>
    <text x="1121" y="368">session_pinning:   False</text>
    <text x="1121" y="383">plan_mode:         False</text>
    <text x="1121" y="398">compact:           False</text>
  </g>
  <line x1="1121" y1="410" x2="1339" y2="410" stroke="#db2777" stroke-width="0.8"/>
  <rect x="1145" y="418" width="170" height="16" rx="4" fill="#db2777"/>
  <text x="1230" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">✓ TEB via Forge MCP (ADR-0069)</text>
  <text x="1230" y="446" text-anchor="middle" font-size="10" fill="#9d174d">L10 path-gate · L16 audit · L33 artifacts</text>
  <text x="1230" y="462" text-anchor="middle" font-size="9" fill="#db2777">spawns copilot -p "&lt;prompt&gt;"</text>
  <text x="1230" y="476" text-anchor="middle" font-size="9" fill="#db2777">L34: us_cloud (GitHub Copilot infra)</text>
  <text x="1230" y="490" text-anchor="middle" font-size="9" fill="#db2777">/btw → not supported (worker-only)</text>

  <!-- ── EAOS / TEB footer ──────────────────────────────────────────── -->
  <rect x="20" y="535" width="1340" height="120" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="690" y="558" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">ADR-0069 EAOS — Engine-Agnostic OS Shell</text>
  <text x="690" y="574" text-anchor="middle" font-size="11" fill="#b91c1c">Every tool call by any non-CC engine flows through the Tool Execution Broker (TEB) in the Forge MCP server</text>

  <!-- TEB box -->
  <rect x="40" y="585" width="290" height="58" rx="8" fill="#dc2626"/>
  <text x="185" y="602" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Tool Execution Broker (TEB)</text>
  <text x="185" y="616" text-anchor="middle" font-size="10" fill="#fecaca">pre-hook: path_gate (L10, fail-closed)</text>
  <text x="185" y="630" text-anchor="middle" font-size="10" fill="#fecaca">post-hook: audit emit (L16) + artifact reg (L33)</text>

  <!-- ECI box -->
  <rect x="350" y="585" width="290" height="58" rx="8" fill="#65a30d"/>
  <text x="495" y="602" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Engine Command Interface (ECI)</text>
  <text x="495" y="616" text-anchor="middle" font-size="10" fill="#d9f99d">EngineCommandManifest · CommandDispatcher</text>
  <text x="495" y="630" text-anchor="middle" font-size="10" fill="#d9f99d">/btw → stdin_json|buffered|None · /e: namespace</text>

  <!-- FCB box -->
  <rect x="660" y="585" width="220" height="58" rx="8" fill="#d97706"/>
  <text x="770" y="602" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Function-Call Bridge (FCB)</text>
  <text x="770" y="616" text-anchor="middle" font-size="10" fill="#fef3c7">MCP ↔ OpenAI format translation</text>
  <text x="770" y="630" text-anchor="middle" font-size="10" fill="#fef3c7">Hermes tool-use loop (max 8 rounds)</text>

  <!-- SkillCompiler box -->
  <rect x="900" y="585" width="170" height="58" rx="8" fill="#7c3aed"/>
  <text x="985" y="602" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SkillCompiler</text>
  <text x="985" y="616" text-anchor="middle" font-size="10" fill="#ede9fe">engine-agnostic</text>
  <text x="985" y="630" text-anchor="middle" font-size="10" fill="#ede9fe">skill injection</text>

  <!-- Capability comparison legend -->
  <text x="690" y="685" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Capability comparison</text>
  <text x="140" y="700" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">Claude Code</text>
  <text x="370" y="700" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">Codex CLI</text>
  <text x="580" y="700" text-anchor="middle" font-size="10" font-weight="600" fill="#064e3b">OpenCode</text>
  <text x="820" y="700" text-anchor="middle" font-size="10" font-weight="600" fill="#7c2d12">Hermes</text>
  <text x="1110" y="700" text-anchor="middle" font-size="10" font-weight="600" fill="#831843">Copilot CLI</text>

  <text x="45" y="714" text-anchor="start" font-size="9" fill="#475569">/btw: live stdin_json</text>
  <text x="275" y="714" text-anchor="start" font-size="9" fill="#475569">/btw: explicit error</text>
  <text x="490" y="714" text-anchor="start" font-size="9" fill="#475569">/btw: explicit error</text>
  <text x="720" y="714" text-anchor="start" font-size="9" fill="#475569">/btw: buffered → next turn</text>
  <text x="1010" y="714" text-anchor="start" font-size="9" fill="#475569">/btw: None (worker-only)</text>

  <text x="45" y="728" text-anchor="start" font-size="9" fill="#475569">hooks: native CC</text>
  <text x="275" y="728" text-anchor="start" font-size="9" fill="#475569">hooks: ✓ TEB</text>
  <text x="490" y="728" text-anchor="start" font-size="9" fill="#475569">hooks: ✓ TEB</text>
  <text x="720" y="728" text-anchor="start" font-size="9" fill="#475569">hooks: ✓ TEB</text>
  <text x="1010" y="728" text-anchor="start" font-size="9" fill="#475569">hooks: ✓ TEB</text>

  <text x="45" y="742" text-anchor="start" font-size="9" fill="#475569">MCP: native</text>
  <text x="275" y="742" text-anchor="start" font-size="9" fill="#475569">MCP: native</text>
  <text x="490" y="742" text-anchor="start" font-size="9" fill="#475569">MCP: native</text>
  <text x="720" y="742" text-anchor="start" font-size="9" fill="#475569">MCP: ✓ FCB-bridged</text>
  <text x="1010" y="742" text-anchor="start" font-size="9" fill="#475569">MCP: None (no subprocess)</text>

  <text x="45" y="756" text-anchor="start" font-size="9" fill="#475569">L34: cloud / EU</text>
  <text x="275" y="756" text-anchor="start" font-size="9" fill="#475569">L34: cloud / EU</text>
  <text x="490" y="756" text-anchor="start" font-size="9" fill="#475569">L34: flex (provider)</text>
  <text x="720" y="756" text-anchor="start" font-size="9" fill="#475569">L34: local CONFIDENTIAL</text>
  <text x="1010" y="756" text-anchor="start" font-size="9" fill="#475569">L34: us_cloud (GitHub)</text>

  <text x="45" y="770" text-anchor="start" font-size="9" fill="#475569">plan_mode: ✓</text>
  <text x="275" y="770" text-anchor="start" font-size="9" fill="#475569">plan_mode: ✗</text>
  <text x="490" y="770" text-anchor="start" font-size="9" fill="#475569">plan_mode: ✗</text>
  <text x="720" y="770" text-anchor="start" font-size="9" fill="#475569">plan_mode: ✗</text>
  <text x="1010" y="770" text-anchor="start" font-size="9" fill="#475569">plan_mode: ✗</text>

  <text x="45" y="784" text-anchor="start" font-size="9" fill="#475569">compact: ✓</text>
