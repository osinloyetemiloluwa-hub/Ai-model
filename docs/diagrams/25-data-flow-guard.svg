<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Data classification × engine compliance matrix (Layer 34 + Layer 35)</title>
  <desc>Four-level data classification matrix (PUBLIC, INTERNAL, CONFIDENTIAL, SECRET) crossed with the engine compliance table (locality and network egress). Shows which engines are allowed for which classification levels. Enforced by DataFlowGuard.validate() pre-spawn. Combined with L35 Egress Lockdown for defense-in-depth.</desc>

  <text x="490" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Data Classification × Engine Compliance (L34 + L35)</text>
  <text x="490" y="52" text-anchor="middle" font-size="12" fill="#475569">EU AI Act Art. 14 · Fail-closed · Pre-spawn gate · DataFlowGuard.validate() · egress_gate.py</text>

  <!-- Classification levels column header -->
  <rect x="60" y="72" width="160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="140" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Classification</text>

  <!-- Engine column headers -->
  <rect x="228" y="72" width="130" height="36" rx="4" fill="#374151"/>
  <text x="293" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">claude_code</text>
  <text x="293" y="101" text-anchor="middle" font-size="9" fill="#d1d5db">us_cloud · external</text>

  <rect x="366" y="72" width="130" height="36" rx="4" fill="#374151"/>
  <text x="431" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">codex_cli</text>
  <text x="431" y="101" text-anchor="middle" font-size="9" fill="#d1d5db">us_cloud · external</text>

  <rect x="504" y="72" width="130" height="36" rx="4" fill="#374151"/>
  <text x="569" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">opencode</text>
  <text x="569" y="101" text-anchor="middle" font-size="9" fill="#d1d5db">unknown · external</text>

  <rect x="642" y="72" width="140" height="36" rx="4" fill="#1e3a8a"/>
  <text x="712" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">opencode_ollama</text>
  <text x="712" y="101" text-anchor="middle" font-size="9" fill="#93c5fd">local · local (Ollama)</text>

  <rect x="790" y="72" width="150" height="36" rx="4" fill="#1e3a8a"/>
  <text x="865" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">opencode_http</text>
  <text x="865" y="101" text-anchor="middle" font-size="9" fill="#93c5fd">local · local (LAN)</text>

  <!-- Row 1: PUBLIC -->
  <rect x="60" y="116" width="160" height="60" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">PUBLIC</text>
  <text x="140" y="152" text-anchor="middle" font-size="9" fill="#0f172a">Any engine allowed</text>
  <text x="140" y="165" text-anchor="middle" font-size="8" fill="#475569">No sensitivity</text>

  <rect x="228" y="116" width="130" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="293" y="147" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="293" y="168" text-anchor="middle" font-size="9" fill="#15803d">allowed</text>

  <rect x="366" y="116" width="130" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="431" y="147" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="431" y="168" text-anchor="middle" font-size="9" fill="#15803d">allowed</text>

  <rect x="504" y="116" width="130" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="569" y="147" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="569" y="168" text-anchor="middle" font-size="9" fill="#15803d">allowed</text>

  <rect x="642" y="116" width="140" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="712" y="147" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="712" y="168" text-anchor="middle" font-size="9" fill="#15803d">allowed</text>

  <rect x="790" y="116" width="150" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="865" y="147" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="865" y="168" text-anchor="middle" font-size="9" fill="#15803d">allowed</text>

  <!-- Row 2: INTERNAL -->
  <rect x="60" y="184" width="160" height="70" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">INTERNAL</text>
  <text x="140" y="220" text-anchor="middle" font-size="9" fill="#0f172a">local or eu_cloud</text>
  <text x="140" y="233" text-anchor="middle" font-size="8" fill="#0f172a">Business-sensitive</text>
  <text x="140" y="246" text-anchor="middle" font-size="8" fill="#475569">Default classification</text>

  <rect x="228" y="184" width="130" height="70" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="293" y="220" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="293" y="243" text-anchor="middle" font-size="9" fill="#991b1b">us_cloud blocked</text>

  <rect x="366" y="184" width="130" height="70" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="431" y="220" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="431" y="243" text-anchor="middle" font-size="9" fill="#991b1b">us_cloud blocked</text>

  <rect x="504" y="184" width="130" height="70" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="569" y="215" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="569" y="233" text-anchor="middle" font-size="9" fill="#991b1b">unknown locality</text>
  <text x="569" y="246" text-anchor="middle" font-size="8" fill="#991b1b">→ denied by default</text>

  <rect x="642" y="184" width="140" height="70" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="712" y="220" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="712" y="243" text-anchor="middle" font-size="9" fill="#15803d">local — allowed</text>

  <rect x="790" y="184" width="150" height="70" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="865" y="220" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="865" y="243" text-anchor="middle" font-size="9" fill="#15803d">local — allowed</text>

  <!-- Row 3: CONFIDENTIAL -->
  <rect x="60" y="262" width="160" height="70" rx="4" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="140" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">CONFIDENTIAL</text>
  <text x="140" y="298" text-anchor="middle" font-size="9" fill="#0f172a">local only</text>
  <text x="140" y="311" text-anchor="middle" font-size="8" fill="#0f172a">PII / personal data</text>
  <text x="140" y="324" text-anchor="middle" font-size="8" fill="#475569">On-premises required</text>

  <rect x="228" y="262" width="130" height="70" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="293" y="298" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="293" y="321" text-anchor="middle" font-size="9" fill="#991b1b">us_cloud blocked</text>

  <rect x="366" y="262" width="130" height="70" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="431" y="298" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="431" y="321" text-anchor="middle" font-size="9" fill="#991b1b">us_cloud blocked</text>

  <rect x="504" y="262" width="130" height="70" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="569" y="298" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="569" y="321" text-anchor="middle" font-size="9" fill="#991b1b">unknown blocked</text>

  <rect x="642" y="262" width="140" height="70" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="712" y="298" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="712" y="321" text-anchor="middle" font-size="9" fill="#15803d">local — allowed</text>

  <rect x="790" y="262" width="150" height="70" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="865" y="298" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="865" y="321" text-anchor="middle" font-size="9" fill="#15803d">local — allowed</text>

  <!-- Row 4: SECRET -->
  <rect x="60" y="340" width="160" height="80" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">SECRET</text>
  <text x="140" y="375" text-anchor="middle" font-size="9" fill="#0f172a">local + egress=none</text>
  <text x="140" y="388" text-anchor="middle" font-size="8" fill="#0f172a">Regulated / classified data</text>
  <text x="140" y="401" text-anchor="middle" font-size="8" fill="#0f172a">Air-gapped only</text>
  <text x="140" y="414" text-anchor="middle" font-size="8" fill="#475569">No outbound network</text>

  <rect x="228" y="340" width="130" height="80" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="293" y="382" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="293" y="408" text-anchor="middle" font-size="9" fill="#991b1b">external egress</text>

  <rect x="366" y="340" width="130" height="80" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="431" y="382" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="431" y="408" text-anchor="middle" font-size="9" fill="#991b1b">external egress</text>

  <rect x="504" y="340" width="130" height="80" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="569" y="382" text-anchor="middle" font-size="22" fill="#dc2626">✗</text>
  <text x="569" y="408" text-anchor="middle" font-size="9" fill="#991b1b">unknown + external</text>

  <rect x="642" y="340" width="140" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="712" y="370" text-anchor="middle" font-size="18" fill="#f59e0b">⚠</text>
  <text x="712" y="390" text-anchor="middle" font-size="9" fill="#92400e">local — OK</text>
  <text x="712" y="404" text-anchor="middle" font-size="8" fill="#92400e">but egress=local</text>
  <text x="712" y="417" text-anchor="middle" font-size="8" fill="#92400e">(not "none") — needs</text>
  <text x="712" y="430" text-anchor="middle" font-size="8" fill="#92400e">operator override</text>

  <rect x="790" y="340" width="150" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="865" y="370" text-anchor="middle" font-size="18" fill="#f59e0b">⚠</text>
  <text x="865" y="390" text-anchor="middle" font-size="9" fill="#92400e">local — OK</text>
  <text x="865" y="404" text-anchor="middle" font-size="8" fill="#92400e">but egress=local</text>
  <text x="865" y="417" text-anchor="middle" font-size="8" fill="#92400e">(not "none") — needs</text>
  <text x="865" y="430" text-anchor="middle" font-size="8" fill="#92400e">operator override</text>

  <!-- Legend for ⚠ -->
  <text x="490" y="445" text-anchor="middle" font-size="9" fill="#92400e">⚠ = conditionally allowed if operator declares network_egress: none in engine_compliance override</text>

  <!-- Audit + block section -->
  <rect x="60" y="460" width="860" height="50" rx="8" fill="#0f172a"/>
  <text x="490" y="480" text-anchor="middle" font-size="11" font-weight="700" fill="#22d3ee">On mismatch: data_flow.blocked (CRITICAL) → IncidentAutoDetector opens engine_policy_violation incident</text>
  <text x="490" y="498" text-anchor="middle" font-size="9" fill="#94a3b8">Allow-list in audit: classification · engine_id · persona · channel · chat_key · reason — NEVER task text or prompt</text>

  <!-- Three-layer defence -->
  <rect x="60" y="524" width="860" height="86" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="543" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Three independent lines of defence (EU AI Act Art. 14)</text>
  <rect x="72" y="552" width="260" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="202" y="570" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">ADR-0007 Zone Routing</text>
  <text x="202" y="585" text-anchor="middle" font-size="9" fill="#0f172a">allowed_engines · forbid_engines</text>
  <text x="202" y="598" text-anchor="middle" font-size="9" fill="#475569">reject before L34</text>
  <rect x="360" y="552" width="260" height="48" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="490" y="570" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">L34 Data Classification</text>
  <text x="490" y="585" text-anchor="middle" font-size="9" fill="#0f172a">locality × network_egress matrix</text>
  <text x="490" y="598" text-anchor="middle" font-size="9" fill="#475569">reject after zone, before spawn</text>
  <rect x="648" y="552" width="260" height="48" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="778" y="570" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">L35 Egress Lockdown</text>
  <text x="778" y="585" text-anchor="middle" font-size="9" fill="#0f172a">host-level allowed/forbidden list</text>
  <text x="778" y="598" text-anchor="middle" font-size="9" fill="#475569">reject after L34, before spawn</text>

  <!-- Tenant config quick reference -->
  <rect x="60" y="624" width="860" height="62" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="80" y="642" font-size="10" font-weight="700" fill="#0f172a">Tenant config (tenant.corvin.yaml):</text>
  <text x="80" y="658" font-size="9" font-family="monospace" fill="#0369a1">spec.data_classification.matrix</text>
  <text x="310" y="658" font-size="9" fill="#475569">— override which localities satisfy each level</text>
  <text x="80" y="674" font-size="9" font-family="monospace" fill="#0369a1">spec.data_classification.engine_compliance</text>
  <text x="390" y="674" font-size="9" fill="#475569">— override locality/egress for custom engines</text>
  <text x="680" y="658" font-size="9" font-family="monospace" fill="#0369a1">spec.egress.allowed_hosts / forbidden_hosts</text>
  <text x="680" y="674" font-size="9" fill="#475569">— L35 host allowlist</text>
</svg>
