<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>A2A — Company-internal Agent Network</title>
  <desc>Company-internal Corvin deployment showing a mesh of connected nodes within Acme GmbH.
  Central HQ orchestrator node connects to Engineering, Legal and Compliance, Marketing, and a GPU
  Compute Cluster via A2A. The compute cluster sub-connects to individual GPU nodes and a batch
  queue. An external contractor connects via a scoped dashed connection to HQ only.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e40af"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="1080" height="800" fill="#f8fafc"/>

  <!-- ── Top banner ─────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="1080" height="64" rx="0" fill="#0f172a"/>
  <text x="540" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">A2A — Company-internal Agent Network</text>
  <text x="540" y="46" text-anchor="middle" font-size="12" fill="#94a3b8">Internal Corvin mesh · Acme GmbH · all connections HMAC-signed and consent-gated</text>

  <!-- ══════════════════════════════════════════════════════════════════
       OUTER BORDER — company boundary
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="24" y="80" width="852" height="600" rx="14" fill="#eff6ff" stroke="#1e40af" stroke-width="2.5"/>
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1e40af">Acme GmbH — internal A2A mesh</text>
  <text x="40" y="118" font-size="10" fill="#3b82f6">acme.internal · private network · spawn_worker: true on all internal nodes</text>

  <!-- ══════════════════════════════════════════════════════════════════
       CENTER — HQ Node
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="338" y="290" width="244" height="110" rx="10" fill="#1e40af" stroke="#0f172a" stroke-width="2"/>
  <!-- subtle highlight -->
  <rect x="338" y="290" width="244" height="32" rx="10" fill="#2563eb"/>
  <rect x="338" y="310" width="244" height="12" fill="#2563eb"/>
  <text x="460" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">HQ Node</text>
  <text x="460" y="328" text-anchor="middle" font-size="10" fill="#bfdbfe">acme-main.internal : 8000</text>
  <line x1="348" y1="336" x2="572" y2="336" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="460" y="352" text-anchor="middle" font-size="10" fill="#93c5fd">persona: orchestrator</text>
  <text x="460" y="368" text-anchor="middle" font-size="10" fill="#93c5fd">spawn_worker: true</text>
  <text x="460" y="384" text-anchor="middle" font-size="9" fill="#bfdbfe">delegate_claude_code · delegate_hermes</text>
  <text x="460" y="396" text-anchor="middle" font-size="9" fill="#bfdbfe">L34 data classification · L35 egress gate</text>

  <!-- ══════════════════════════════════════════════════════════════════
       CONNECTION LINES (before nodes so they appear under them)
  ══════════════════════════════════════════════════════════════════ -->

  <!-- HQ ↔ Engineering (top-left) -->
  <line x1="370" y1="305" x2="238" y2="236" stroke="#1e40af" stroke-width="2"
        marker-start="url(#arr-blue)" marker-end="url(#arr-blue)"/>
  <rect x="254" y="256" width="106" height="18" rx="4" fill="#dbeafe"/>
  <text x="307" y="269" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">delegate code tasks</text>

  <!-- HQ ↔ Legal (top-right) -->
  <line x1="550" y1="305" x2="702" y2="234" stroke="#d97706" stroke-width="2"
        marker-start="url(#arr-amber)" marker-end="url(#arr-amber)"/>
  <rect x="580" y="256" width="112" height="18" rx="4" fill="#fef3c7"/>
  <text x="636" y="269" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">contract review</text>

  <!-- HQ ↔ Marketing (bottom-left) -->
  <line x1="370" y1="392" x2="232" y2="462" stroke="#9333ea" stroke-width="2"
        marker-start="url(#arr-purple)" marker-end="url(#arr-purple)"/>
  <rect x="246" y="414" width="116" height="18" rx="4" fill="#f5f3ff"/>
  <text x="304" y="427" text-anchor="middle" font-size="9" font-weight="600" fill="#9333ea">content generation</text>

  <!-- HQ ↔ Compute Cluster (bottom-right) -->
  <line x1="554" y1="392" x2="700" y2="466" stroke="#16a34a" stroke-width="2"
        marker-start="url(#arr-green)" marker-end="url(#arr-green)"/>
  <rect x="580" y="414" width="102" height="18" rx="4" fill="#dcfce7"/>
  <text x="631" y="427" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">GPU jobs · batch</text>

  <!-- ══════════════════════════════════════════════════════════════════
       SATELLITE NODES
  ══════════════════════════════════════════════════════════════════ -->

  <!-- Engineering Team (top-left) -->
  <rect x="52" y="140" width="220" height="90" rx="10" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <rect x="52" y="140" width="220" height="30" rx="10" fill="#1e40af"/>
  <rect x="52" y="158" width="220" height="12" fill="#1e40af"/>
  <text x="162" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Engineering Team</text>
  <text x="162" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">acme-eng.internal : 8000</text>
  <text x="162" y="191" text-anchor="middle" font-size="9" fill="#475569">spawn_worker: true</text>
  <text x="162" y="204" text-anchor="middle" font-size="9" fill="#475569">personas: orchestrator, coder</text>
  <text x="162" y="217" text-anchor="middle" font-size="8" fill="#94a3b8">L22 ClaudeCode + L25 Compute</text>

  <!-- Legal (top-right) -->
  <rect x="648" y="140" width="200" height="90" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="648" y="140" width="200" height="30" rx="10" fill="#d97706"/>
  <rect x="648" y="158" width="200" height="12" fill="#d97706"/>
  <text x="748" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Legal &amp; Compliance</text>
  <text x="748" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">acme-legal.internal : 8000</text>
  <text x="748" y="191" text-anchor="middle" font-size="9" fill="#475569">spawn_worker: false</text>
  <text x="748" y="204" text-anchor="middle" font-size="9" fill="#475569">persona: assistant (observer)</text>
  <text x="748" y="217" text-anchor="middle" font-size="8" fill="#94a3b8">read-only role · consent required</text>

  <!-- Marketing (bottom-left) -->
  <rect x="52" y="434" width="210" height="90" rx="10" fill="#f5f3ff" stroke="#9333ea" stroke-width="2"/>
  <rect x="52" y="434" width="210" height="30" rx="10" fill="#9333ea"/>
  <rect x="52" y="452" width="210" height="12" fill="#9333ea"/>
  <text x="157" y="454" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Marketing</text>
  <text x="157" y="471" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">acme-mktg.internal : 8000</text>
  <text x="157" y="485" text-anchor="middle" font-size="9" fill="#475569">spawn_worker: true</text>
  <text x="157" y="499" text-anchor="middle" font-size="9" fill="#475569">persona: research, assistant</text>
  <text x="157" y="512" text-anchor="middle" font-size="8" fill="#94a3b8">L35 egress: allowed_hosts restricted</text>

  <!-- Compute Cluster (bottom-right) -->
  <rect x="640" y="434" width="224" height="112" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <rect x="640" y="434" width="224" height="30" rx="10" fill="#16a34a"/>
  <rect x="640" y="452" width="224" height="12" fill="#16a34a"/>
  <text x="752" y="454" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Compute Cluster</text>
  <text x="752" y="471" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">acme-compute.internal : 8000</text>
  <text x="752" y="485" text-anchor="middle" font-size="9" fill="#475569">spawn_worker: true · L25 enabled</text>
  <text x="752" y="499" text-anchor="middle" font-size="9" fill="#475569">HermesEngine (local · egress: none)</text>
  <text x="752" y="513" text-anchor="middle" font-size="8" fill="#475569">GPU jobs · batch · deterministic</text>
  <text x="752" y="525" text-anchor="middle" font-size="8" fill="#94a3b8">locality=local · CONFIDENTIAL-capable</text>

  <!-- ── GPU sub-nodes from Compute Cluster ────────────────────────── -->

  <!-- Sub-connection lines -->
  <line x1="864" y1="490" x2="940" y2="490" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="864" y1="504" x2="940" y2="538" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="864" y1="518" x2="940" y2="574" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- GPU Node 1 -->
  <rect x="940" y="474" width="124" height="30" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1002" y="487" text-anchor="middle" font-size="9" font-weight="700" fill="#14532d">GPU Node 1</text>
  <text x="1002" y="499" text-anchor="middle" font-size="8" fill="#475569">A100 · Ollama</text>

  <!-- GPU Node 2 -->
  <rect x="940" y="522" width="124" height="30" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1002" y="535" text-anchor="middle" font-size="9" font-weight="700" fill="#14532d">GPU Node 2</text>
  <text x="1002" y="547" text-anchor="middle" font-size="8" fill="#475569">A100 · Ollama</text>

  <!-- Batch Queue -->
  <rect x="940" y="558" width="124" height="30" rx="6" fill="#d1fae5" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="1002" y="571" text-anchor="middle" font-size="9" font-weight="700" fill="#14532d">Batch Queue</text>
  <text x="1002" y="583" text-anchor="middle" font-size="8" fill="#475569">jobs · async</text>

  <!-- ══════════════════════════════════════════════════════════════════
       EXTERNAL CONNECTION — outside company border
  ══════════════════════════════════════════════════════════════════ -->

  <!-- Dashed line from HQ to external contractor -->
  <line x1="460" y1="400" x2="460" y2="660" stroke="#64748b" stroke-width="1.5"
        stroke-dasharray="6 4" marker-end="url(#arr-slate)"/>
  <rect x="356" y="618" width="200" height="18" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="456" y="631" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">scoped connection</text>

  <!-- External node -->
  <rect x="320" y="672" width="280" height="76" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" stroke-dasharray="6 3"/>
  <circle cx="352" cy="710" r="14" fill="#94a3b8"/>
  <text x="352" y="714" text-anchor="middle" font-size="10" fill="#fff">ext</text>
  <text x="470" y="698" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">External Contractor</text>
  <text x="470" y="714" text-anchor="middle" font-size="10" fill="#64748b">freelancer.corvin.eu : 8000</text>
  <text x="470" y="728" text-anchor="middle" font-size="9" fill="#94a3b8">allowed_personas: assistant only</text>
  <text x="470" y="740" text-anchor="middle" font-size="9" fill="#94a3b8">spawn_worker: false · read-only role</text>

  <!-- "External" label on border crossing -->
  <rect x="365" y="650" width="190" height="18" rx="4" fill="#0f172a"/>
  <text x="460" y="662" text-anchor="middle" font-size="9" fill="#94a3b8">outside company mesh boundary</text>

  <!-- ══════════════════════════════════════════════════════════════════
       LEGEND BOX — top-right
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="900" y="84" width="172" height="132" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="986" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Legend</text>
  <line x1="912" y1="109" x2="1060" y2="109" stroke="#e2e8f0" stroke-width="1"/>

  <circle cx="926" cy="126" r="6" fill="#1e40af"/>
  <text x="938" y="130" font-size="10" fill="#0f172a">Internal (spawn_worker: true)</text>

  <circle cx="926" cy="148" r="6" fill="#d97706"/>
  <text x="938" y="152" font-size="10" fill="#0f172a">Internal (observer only)</text>

  <circle cx="926" cy="170" r="6" fill="#16a34a"/>
  <text x="938" y="174" font-size="10" fill="#0f172a">Compute (GPU / batch)</text>

  <line x1="920" y1="192" x2="940" y2="192" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr-slate)"/>
  <text x="948" y="196" font-size="10" fill="#0f172a">External (scoped)</text>

  <!-- ══════════════════════════════════════════════════════════════════
       BOTTOM ANNOTATION BAR
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="0" y="756" width="1080" height="44" fill="#0f172a"/>
  <text x="540" y="774" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">All connections: HMAC-signed<tspan fill="#64748b"> · </tspan>Consent-gated<tspan fill="#64748b"> · </tspan>Audited to tamper-evident chain</text>
  <text x="540" y="790" text-anchor="middle" font-size="9" fill="#475569">EU AI Act Art. 14 engine policy per node · L34 data classification · L35 egress lockdown · L38 A2A protocol v3</text>

</svg>
