<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Art. 73 — 15-day serious incident response timeline</title>
  <desc>EU AI Act Art. 73 §2 requires notification to supervisory authorities within 15 days of becoming aware of a serious incident. This diagram shows the full response timeline from auto-detection (Day 0) through containment, notification draft, legal review, submission (Day 15 hard deadline), and closure. Each step maps to an Corvin CLI command and an audit event.</desc>

  <text x="490" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Art. 73 — Serious Incident Response (15-day clock)</text>
  <text x="490" y="52" text-anchor="middle" font-size="12" fill="#475569">L39 IncidentAutoDetector · corvin-incident CLI · 15-day hard deadline after detection</text>

  <!-- Timeline bar -->
  <rect x="60" y="72" width="860" height="20" rx="4" fill="#e2e8f0"/>

  <!-- Day markers on timeline -->
  <!-- Day 0 -->
  <rect x="60" y="72" width="60" height="20" rx="4" fill="#dc2626"/>
  <text x="90" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Day 0</text>

  <!-- Day 1 -->
  <rect x="124" y="72" width="80" height="20" rx="0" fill="#f97316"/>
  <text x="164" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Day 1</text>

  <!-- Day 2-5 -->
  <rect x="208" y="72" width="186" height="20" rx="0" fill="#f59e0b"/>
  <text x="301" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Days 2–5</text>

  <!-- Day 6-8 -->
  <rect x="398" y="72" width="140" height="20" rx="0" fill="#eab308"/>
  <text x="468" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Days 6–8</text>

  <!-- Day 9-12 -->
  <rect x="542" y="72" width="186" height="20" rx="0" fill="#84cc16"/>
  <text x="635" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Days 9–12</text>

  <!-- Day 13-14 -->
  <rect x="732" y="72" width="90" height="20" rx="0" fill="#22c55e"/>
  <text x="777" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Days 13–14</text>

  <!-- Day 15 hard deadline -->
  <rect x="826" y="68" width="94" height="28" rx="4" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="873" y="83" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Day 15</text>
  <text x="873" y="93" text-anchor="middle" font-size="8" fill="#fca5a5">HARD DEADLINE</text>

  <!-- Phase boxes -->
  <!-- Day 0: Detection -->
  <rect x="60" y="108" width="130" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="125" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">Day 0</text>
  <text x="125" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Detection</text>
  <text x="125" y="156" text-anchor="middle" font-size="8" fill="#0f172a">CRITICAL audit event</text>
  <text x="125" y="169" text-anchor="middle" font-size="8" fill="#0f172a">IncidentAutoDetector</text>
  <text x="125" y="182" text-anchor="middle" font-size="8" fill="#0f172a">opens incident record</text>
  <rect x="70" y="192" width="110" height="20" rx="4" fill="#0f172a"/>
  <text x="125" y="206" text-anchor="middle" font-size="8" font-family="monospace" fill="#22d3ee">incident.opened (CRIT)</text>

  <!-- Day 1: DPO review -->
  <rect x="204" y="108" width="140" height="110" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="274" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#c2410c">Day 1</text>
  <text x="274" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">DPO Review</text>
  <text x="274" y="156" text-anchor="middle" font-size="8" fill="#0f172a">Confirm: real failure</text>
  <text x="274" y="169" text-anchor="middle" font-size="8" fill="#0f172a">or test/probe?</text>
  <rect x="214" y="180" width="120" height="16" rx="3" fill="#f97316"/>
  <text x="274" y="192" text-anchor="middle" font-size="8" font-family="monospace" fill="#fff">corvin-incident show</text>
  <rect x="214" y="200" width="120" height="16" rx="3" fill="#0f172a"/>
  <text x="274" y="212" text-anchor="middle" font-size="8" font-family="monospace" fill="#22d3ee">→ audit chain review</text>

  <!-- Day 2-5: Containment -->
  <rect x="358" y="108" width="166" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="441" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Days 2–5</text>
  <text x="441" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Containment + RCA</text>
  <text x="441" y="156" text-anchor="middle" font-size="8" fill="#0f172a">Stop service if needed</text>
  <text x="441" y="169" text-anchor="middle" font-size="8" fill="#0f172a">Root cause analysis</text>
  <rect x="368" y="180" width="146" height="16" rx="3" fill="#f59e0b"/>
  <text x="441" y="192" text-anchor="middle" font-size="8" font-family="monospace" fill="#fff">--status contained</text>
  <rect x="368" y="200" width="146" height="16" rx="3" fill="#0f172a"/>
  <text x="441" y="212" text-anchor="middle" font-size="8" font-family="monospace" fill="#22d3ee">incident.status_changed</text>

  <!-- Day 6-8: Notify-draft -->
  <rect x="538" y="108" width="160" height="110" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="618" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#713f12">Days 6–8</text>
  <text x="618" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Generate Draft</text>
  <text x="618" y="156" text-anchor="middle" font-size="8" fill="#0f172a">Art. 73 §2 notification</text>
  <text x="618" y="169" text-anchor="middle" font-size="8" fill="#0f172a">Sections 1-7 template</text>
  <rect x="548" y="180" width="140" height="16" rx="3" fill="#eab308"/>
  <text x="618" y="192" text-anchor="middle" font-size="8" font-family="monospace" fill="#fff">notify-draft --authority BSI</text>
  <rect x="548" y="200" width="140" height="16" rx="3" fill="#0f172a"/>
  <text x="618" y="212" text-anchor="middle" font-size="8" font-family="monospace" fill="#22d3ee">→ notification-&lt;id&gt;.md</text>

  <!-- Day 9-12: Legal review -->
  <rect x="712" y="108" width="116" height="110" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Days 9–12</text>
  <text x="770" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Legal Review</text>
  <text x="770" y="156" text-anchor="middle" font-size="8" fill="#0f172a">DPO + Legal fill</text>
  <text x="770" y="169" text-anchor="middle" font-size="8" fill="#0f172a">[OPERATOR: …] sections</text>
  <text x="770" y="182" text-anchor="middle" font-size="8" fill="#0f172a">Sections 3–6: impact,</text>
  <text x="770" y="195" text-anchor="middle" font-size="8" fill="#0f172a">root cause, remediation</text>
  <rect x="718" y="203" width="104" height="14" rx="3" fill="#22c55e"/>
  <text x="770" y="214" text-anchor="middle" font-size="8" font-family="monospace" fill="#fff">manual editor</text>

  <!-- Days 13-15: Submit (left half x=60-450, right half x=450-920) -->
  <rect x="60" y="240" width="860" height="80" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="255" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Days 13–14: Submit to supervisory authority</text>
  <text x="255" y="276" text-anchor="middle" font-size="9" fill="#0f172a">Send notification to BSI / BfDI / ENISA · mark as notified in Corvin</text>
  <rect x="80" y="281" width="300" height="38" rx="4" fill="#0f172a"/>
  <text x="230" y="295" text-anchor="middle" font-size="9" font-family="monospace" fill="#22d3ee">corvin-incident update &lt;id&gt;</text>
  <text x="230" y="310" text-anchor="middle" font-size="9" font-family="monospace" fill="#22d3ee">  --status notified --notified-at &lt;ISO&gt;</text>
  <text x="715" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Day 15: HARD DEADLINE (Art. 73 §2)</text>
  <text x="715" y="276" text-anchor="middle" font-size="9" fill="#0f172a">If incomplete → submit preliminary notification with known facts</text>
  <rect x="470" y="281" width="220" height="38" rx="4" fill="#dc2626"/>
  <text x="580" y="295" text-anchor="middle" font-size="9" font-family="monospace" fill="#fff">Missing deadline →</text>
  <text x="580" y="310" text-anchor="middle" font-size="9" font-family="monospace" fill="#fff">  regulatory violation</text>

  <!-- Six incident categories -->
  <text x="60" y="354" font-size="12" font-weight="700" fill="#0f172a">Incident categories and how they're detected</text>

  <!-- Auto-detected -->
  <rect x="60" y="368" width="420" height="130" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="80" y="386" font-size="10" font-weight="700" fill="#991b1b">Auto-detected (IncidentAutoDetector on CRITICAL event)</text>

  <rect x="72" y="394" width="8" height="8" fill="#dc2626"/>
  <text x="86" y="403" font-size="9" font-family="monospace" fill="#0f172a">chain_integrity</text>
  <text x="185" y="403" font-size="9" fill="#475569">← audit.chain_gap_detected</text>

  <rect x="72" y="414" width="8" height="8" fill="#dc2626"/>
  <text x="86" y="423" font-size="9" font-family="monospace" fill="#0f172a">engine_policy_violation</text>
  <text x="217" y="423" font-size="9" fill="#475569">← data_flow.blocked · egress.blocked</text>

  <rect x="72" y="434" width="8" height="8" fill="#dc2626"/>
  <text x="86" y="443" font-size="9" font-family="monospace" fill="#0f172a">secret_exposure</text>
  <text x="185" y="443" font-size="9" fill="#475569">← path_gate.denied on vault path</text>

  <rect x="60" y="458" width="420" height="44" rx="4" fill="#0f172a"/>
  <text x="270" y="472" text-anchor="middle" font-size="9" font-family="monospace" fill="#22d3ee">Fires on: audit.chain_gap_detected · data_flow.blocked</text>
  <text x="270" y="484" text-anchor="middle" font-size="9" font-family="monospace" fill="#22d3ee">  · egress.blocked · path_gate.denied</text>
  <text x="270" y="497" text-anchor="middle" font-size="8" fill="#94a3b8">No manual action needed for detection — operator must review + decide severity</text>

  <!-- Daily scan -->
  <rect x="500" y="368" width="420" height="130" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="520" y="386" font-size="10" font-weight="700" fill="#0369a1">Daily batch scan (corvin-incident-scan.timer, 03:45 UTC)</text>

  <rect x="512" y="394" width="8" height="8" fill="#0ea5e9"/>
  <text x="526" y="403" font-size="9" font-family="monospace" fill="#0f172a">consent_bypass</text>
  <text x="625" y="403" font-size="9" fill="#475569">message_received without consent.granted</text>

  <rect x="512" y="414" width="8" height="8" fill="#0ea5e9"/>
  <text x="526" y="423" font-size="9" font-family="monospace" fill="#0f172a">disclosure_failure</text>
  <text x="635" y="423" font-size="9" fill="#475569">message_received without disclosure.shown</text>

  <rect x="512" y="434" width="8" height="8" fill="#0ea5e9"/>
  <text x="526" y="443" font-size="9" font-family="monospace" fill="#0f172a">pii_in_audit_chain</text>
  <text x="635" y="443" font-size="9" fill="#475569">email/phone regex match in audit segment</text>

  <rect x="500" y="458" width="420" height="32" rx="4" fill="#0f172a"/>
  <text x="710" y="473" text-anchor="middle" font-size="9" font-family="monospace" fill="#22d3ee">corvin-incident scan --since 30</text>
  <text x="710" y="485" text-anchor="middle" font-size="8" fill="#94a3b8">Returns findings for DPO review → call open_incident() for confirmed failures</text>

  <!-- Closure and remediation -->
  <rect x="60" y="514" width="860" height="60" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="490" y="534" text-anchor="middle" font-size="10" font-weight="700" fill="#7e22ce">Post-submission: Remediation + Closure</text>
  <text x="490" y="550" text-anchor="middle" font-size="9" fill="#0f172a">Implement preventive controls · verify fix · close incident</text>
  <rect x="310" y="556" width="176" height="12" rx="3" fill="#a855f7"/>
  <text x="398" y="565" text-anchor="middle" font-size="8" font-family="monospace" fill="#fff">corvin-incident close &lt;id&gt;</text>
  <text x="530" y="565" font-size="9" fill="#475569">→ incident.closed (INFO) with duration_hours</text>

  <!-- Supervisory authorities -->
  <rect x="60" y="590" width="860" height="62" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="490" y="608" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">EU Supervisory Authorities for Art. 73 notification</text>
  <text x="200" y="628" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Germany — AI / security</text>
  <text x="200" y="641" text-anchor="middle" font-size="9" fill="#475569">BSI (Bundesamt für Sicherheit)</text>
  <text x="490" y="628" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Germany — GDPR-intersecting</text>
  <text x="490" y="641" text-anchor="middle" font-size="9" fill="#475569">BfDI (Bundesbeauftragter f. Datenschutz)</text>
  <text x="780" y="628" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">EU — cross-border</text>
  <text x="780" y="641" text-anchor="middle" font-size="9" fill="#475569">ENISA</text>
</svg>
