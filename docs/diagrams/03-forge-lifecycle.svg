<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Forge — lifecycle of one tool</title>
  <desc>Two phases shown side by side. Forge phase: forge_tool input goes through static check, forbidden-name check, registry write, MCP list_changed notification, audit entry forge.created. Call phase: incoming call goes through ACL gate, post-hoc forbidden-name re-check, breaker check, schema validation, sandbox execution under bwrap, run manifest write, deterministic cache, audit entry forge.called, return JSON envelope to Claude.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="540" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Forge — lifecycle of one tool</text>
  <text x="540" y="52" text-anchor="middle" font-size="12" fill="#475569">Two phases: forge (left) writes the tool; call (right) runs it. Both phases append audit entries.</text>

  <!-- Phase A: Forge -->
  <rect x="30" y="80" width="490" height="470" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="275" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Phase 1 — forge a tool</text>

  <!-- forge_tool input -->
  <rect x="60" y="125" width="220" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="170" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">mcp__forge__forge_tool</text>
  <text x="170" y="162" text-anchor="middle" font-size="9" fill="#0f172a">name · schema · impl · runtime</text>

  <!-- static check -->
  <rect x="60" y="190" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="170" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">static check</text>
  <text x="170" y="222" text-anchor="middle" font-size="9" fill="#475569">no os.system · no socket etc.</text>

  <!-- forbidden-name check -->
  <rect x="60" y="245" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="170" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">forbidden-name check</text>
  <text x="170" y="277" text-anchor="middle" font-size="9" fill="#475569">policy.json forbidden_tool_names</text>

  <!-- registry write -->
  <rect x="60" y="300" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="170" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">registry write (atomic)</text>
  <text x="170" y="332" text-anchor="middle" font-size="9" fill="#475569">.claude/forge/tools/&lt;name&gt;.json</text>

  <!-- MCP notify -->
  <rect x="60" y="355" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="170" y="373" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">MCP notify</text>
  <text x="170" y="387" text-anchor="middle" font-size="9" fill="#475569">notifications/tools/list_changed</text>

  <!-- Audit forge.created -->
  <rect x="60" y="410" width="220" height="40" rx="6" fill="#cffafe" stroke="#06b6d4"/>
  <text x="170" y="428" text-anchor="middle" font-size="10" font-weight="700" fill="#0e7490">audit append</text>
  <text x="170" y="442" text-anchor="middle" font-size="9" fill="#0f172a">forge.created (sha-chained)</text>

  <!-- Output: agent sees -->
  <rect x="320" y="245" width="180" height="60" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="410" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">agent sees</text>
  <text x="410" y="285" text-anchor="middle" font-size="10" fill="#0f172a">mcp__forge__&lt;name&gt;</text>
  <text x="410" y="298" text-anchor="middle" font-size="10" fill="#0f172a">in next tools/list</text>

  <!-- Reject path -->
  <rect x="320" y="395" width="180" height="50" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="410" y="416" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">reject (any check)</text>
  <text x="410" y="432" text-anchor="middle" font-size="9" fill="#0f172a">error.kind = static_check_failed</text>
  <text x="410" y="444" text-anchor="middle" font-size="9" fill="#0f172a">/ name_forbidden / name_taken</text>

  <!-- Arrows phase A -->
  <line x1="170" y1="173" x2="170" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="170" y1="230" x2="170" y2="245" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="170" y1="285" x2="170" y2="300" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="170" y1="340" x2="170" y2="355" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="170" y1="395" x2="170" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="280" y1="375" x2="320" y2="285" stroke="#10b981" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="280" y1="265" x2="320" y2="420" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>
  <line x1="280" y1="210" x2="320" y2="425" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>

  <!-- Phase B: Call -->
  <rect x="560" y="80" width="490" height="470" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="805" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Phase 2 — call the tool</text>

  <!-- Call entry -->
  <rect x="600" y="125" width="220" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="710" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">mcp__forge__&lt;name&gt;</text>
  <text x="710" y="162" text-anchor="middle" font-size="9" fill="#0f172a">input matching schema</text>

  <!-- ACL gate -->
  <rect x="600" y="190" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="710" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">ACL gate</text>
  <text x="710" y="222" text-anchor="middle" font-size="9" fill="#475569">FORGE_ALLOWED_TOOLS (per-persona)</text>

  <!-- Post-hoc forbidden -->
  <rect x="600" y="245" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="710" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">forbidden-name re-check</text>
  <text x="710" y="277" text-anchor="middle" font-size="9" fill="#475569">closes the post-hoc gap (Phase D)</text>

  <!-- Breaker -->
  <rect x="600" y="300" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="710" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">breaker check</text>
  <text x="710" y="332" text-anchor="middle" font-size="9" fill="#475569">per-tool rpm · per-session forge count</text>

  <!-- Schema validate -->
  <rect x="600" y="355" width="220" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="710" y="373" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">schema validation</text>
  <text x="710" y="387" text-anchor="middle" font-size="9" fill="#475569">JSON-Schema · x-redact applied</text>

  <!-- bwrap exec -->
  <rect x="600" y="410" width="220" height="50" rx="6" fill="#cffafe" stroke="#06b6d4"/>
  <text x="710" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#0e7490">sandbox exec (bwrap)</text>
  <text x="710" y="444" text-anchor="middle" font-size="9" fill="#0f172a">x-bind mounts only · no net by default</text>
  <text x="710" y="456" text-anchor="middle" font-size="9" fill="#0f172a">stdin = validated input</text>

  <!-- Manifest + cache + audit -->
  <rect x="600" y="475" width="220" height="58" rx="6" fill="#cffafe" stroke="#06b6d4"/>
  <text x="710" y="495" text-anchor="middle" font-size="10" font-weight="700" fill="#0e7490">runs/&lt;id&gt;/run_manifest.json</text>
  <text x="710" y="510" text-anchor="middle" font-size="9" fill="#0f172a">cache (if meta.deterministic)</text>
  <text x="710" y="524" text-anchor="middle" font-size="9" fill="#0f172a">audit forge.called  (sha-chain)</text>

  <!-- Right column: outcomes -->
  <rect x="850" y="245" width="190" height="60" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="945" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">return to Claude</text>
  <text x="945" y="285" text-anchor="middle" font-size="9" fill="#0f172a">{ok:true, data, meta}</text>
  <text x="945" y="298" text-anchor="middle" font-size="9" fill="#0f172a">or {ok:false, error}</text>

  <rect x="850" y="395" width="190" height="65" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="945" y="416" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">deny (gate failure)</text>
  <text x="945" y="432" text-anchor="middle" font-size="9" fill="#0f172a">acl.persona_denied · name_forbidden</text>
  <text x="945" y="445" text-anchor="middle" font-size="9" fill="#0f172a">breaker_open · validation_failed</text>
  <text x="945" y="455" text-anchor="middle" font-size="9" fill="#0f172a">audit append (deny event)</text>

  <!-- Arrows phase B -->
  <line x1="710" y1="173" x2="710" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="710" y1="230" x2="710" y2="245" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="710" y1="285" x2="710" y2="300" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="710" y1="340" x2="710" y2="355" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="710" y1="395" x2="710" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="710" y1="460" x2="710" y2="475" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="820" y1="500" x2="850" y2="290" stroke="#10b981" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="820" y1="210" x2="850" y2="430" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>
  <line x1="820" y1="265" x2="850" y2="430" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>
  <line x1="820" y1="320" x2="850" y2="430" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>
  <line x1="820" y1="375" x2="850" y2="430" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>

  <!-- Footnote -->
  <text x="540" y="572" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">
    Cyan = audit-emitting / sandboxed. Green = success path. Red = deny / error path. Every red exit also writes an audit entry.
  </text>
</svg>
