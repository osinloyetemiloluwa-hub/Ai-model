<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>One message from phone to reply — the dispatch path</title>
  <desc>Eight stages along a horizontal pipeline. From left: phone, daemon, adapter (with persona resolution and routing as a sub-block), claude subprocess, audit append, daemon delivery, phone reply. Hot-reload boundaries are annotated with dashed cyan callouts at the daemon and adapter stages.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="ar-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <text x="540" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">One message — phone to reply</text>
  <text x="540" y="52" text-anchor="middle" font-size="12" fill="#475569">Hot-reload happens between messages, never within. One subprocess per message; one adapter loop overall.</text>

  <!-- Stage 1: Phone -->
  <g>
    <rect x="20" y="100" width="120" height="70" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="80" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">phone</text>
    <text x="80" y="145" text-anchor="middle" font-size="10" fill="#475569">text / voice note</text>
    <text x="80" y="160" text-anchor="middle" font-size="10" fill="#475569">via WhatsApp etc.</text>
  </g>

  <!-- Stage 2: Daemon -->
  <g>
    <rect x="170" y="100" width="140" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="240" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">bridge daemon</text>
    <text x="240" y="142" text-anchor="middle" font-size="10" fill="#0f172a">whitelist · rate limit</text>
    <text x="240" y="157" text-anchor="middle" font-size="10" fill="#0f172a">→ inbox/&lt;id&gt;.json</text>
  </g>

  <!-- Stage 3: Adapter -->
  <g>
    <rect x="340" y="100" width="220" height="160" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="450" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">adapter (one process)</text>
    <text x="450" y="143" text-anchor="middle" font-size="10" fill="#0f172a">whisper transcribe (if voice)</text>
    <text x="450" y="158" text-anchor="middle" font-size="10" fill="#0f172a">_resolve_chat_profile()</text>

    <!-- Sub-block: cowork merge -->
    <rect x="355" y="170" width="190" height="32" rx="6" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
    <text x="450" y="190" text-anchor="middle" font-size="10" fill="#1e40af">cowork merge (if persona set)</text>

    <!-- Sub-block: router -->
    <rect x="355" y="210" width="190" height="32" rx="6" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
    <text x="450" y="230" text-anchor="middle" font-size="10" fill="#1e40af">router.route() (if no pin)</text>
  </g>

  <!-- Stage 4: claude subprocess -->
  <g>
    <rect x="600" y="100" width="180" height="160" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="690" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">claude subprocess</text>
    <text x="690" y="143" text-anchor="middle" font-size="10" fill="#475569">--mcp-config (forge etc.)</text>
    <text x="690" y="158" text-anchor="middle" font-size="10" fill="#475569">--allowedTools, --add-dir</text>
    <text x="690" y="173" text-anchor="middle" font-size="10" fill="#475569">FORGE_ALLOWED_TOOLS</text>

    <!-- Sub-block: forge call -->
    <rect x="615" y="195" width="150" height="32" rx="6" fill="#cffafe" stroke="#06b6d4" stroke-width="1"/>
    <text x="690" y="215" text-anchor="middle" font-size="10" fill="#0e7490">mcp__forge__&lt;name&gt; (opt.)</text>

    <!-- Sub-block: tool calls -->
    <rect x="615" y="232" width="150" height="20" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="690" y="246" text-anchor="middle" font-size="9" fill="#475569">Bash · Read · Edit · MCP</text>
  </g>

  <!-- Stage 5: Audit -->
  <g>
    <rect x="820" y="100" width="140" height="70" rx="10" fill="#cffafe" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="890" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#0e7490">audit append</text>
    <text x="890" y="142" text-anchor="middle" font-size="10" fill="#0f172a">SHA-chain entry</text>
    <text x="890" y="157" text-anchor="middle" font-size="10" fill="#0f172a">no-op if forge missing</text>
  </g>

  <!-- Stage 6: Outbox / daemon return -->
  <g>
    <rect x="820" y="195" width="140" height="65" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="890" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">daemon out</text>
    <text x="890" y="235" text-anchor="middle" font-size="10" fill="#0f172a">outbox/&lt;id&gt;.json</text>
    <text x="890" y="250" text-anchor="middle" font-size="10" fill="#0f172a">+ voice note (opt.)</text>
  </g>

  <!-- Stage 7: Phone reply -->
  <g>
    <rect x="980" y="195" width="80" height="65" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="1020" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">reply</text>
    <text x="1020" y="240" text-anchor="middle" font-size="10" fill="#475569">[browser] …</text>
  </g>

  <!-- Arrows along the main flow -->
  <line x1="140" y1="135" x2="170" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="310" y1="135" x2="340" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="560" y1="180" x2="600" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="780" y1="135" x2="820" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="780" y1="225" x2="820" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="960" y1="225" x2="980" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Hot-reload callouts -->
  <g>
    <rect x="170" y="325" width="200" height="40" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="270" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#0e7490">hot-reload boundary</text>
    <text x="270" y="358" text-anchor="middle" font-size="9" fill="#0f172a">currentSettings() · mtime cache</text>
    <line x1="270" y1="325" x2="240" y2="170" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  <g>
    <rect x="380" y="325" width="220" height="40" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="490" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#0e7490">hot-reload boundary</text>
    <text x="490" y="358" text-anchor="middle" font-size="9" fill="#0f172a">_load_channel_settings · persona JSON · policy.json</text>
    <line x1="490" y1="325" x2="450" y2="260" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Failure-mode atlas (bottom) -->
  <g>
    <rect x="40" y="410" width="1000" height="160" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="540" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Where things fail — symptom → stage → log line</text>

    <text x="60"  y="460" font-size="10" font-weight="700" fill="#475569">Bot does not reply at all</text>
    <text x="60"  y="476" font-size="9" fill="#0f172a">→ stage 2 · daemon log: "whitelist rejected" / "rate-limit hit"</text>

    <text x="60"  y="498" font-size="10" font-weight="700" fill="#475569">Recent setting change ignored</text>
    <text x="60"  y="514" font-size="9" fill="#0f172a">→ stage 3 · adapter log: "settings.json reloaded (mtime=…)"</text>

    <text x="60"  y="536" font-size="10" font-weight="700" fill="#475569">Wrong persona picked</text>
    <text x="60"  y="552" font-size="9" fill="#0f172a">→ stage 3 · adapter log: "routing decision: …"</text>

    <text x="380" y="460" font-size="10" font-weight="700" fill="#475569">Forged tool not visible</text>
    <text x="380" y="476" font-size="9" fill="#0f172a">→ stage 4 · race; need 1 tick after forge_tool</text>

    <text x="380" y="498" font-size="10" font-weight="700" fill="#475569">Forged call blocked unexpectedly</text>
    <text x="380" y="514" font-size="9" fill="#0f172a">→ stage 4/5 · voice-audit tail · policy.reloaded</text>

    <text x="380" y="536" font-size="10" font-weight="700" fill="#475569">Reply ok but no voice note</text>
    <text x="380" y="552" font-size="9" fill="#0f172a">→ stage 6 · voice_summary_mode in shared/settings.json</text>

    <text x="700" y="460" font-size="10" font-weight="700" fill="#475569">MCP tool from persona missing</text>
    <text x="700" y="476" font-size="9" fill="#0f172a">→ stage 4 · check temp --mcp-config invocation</text>

    <text x="700" y="498" font-size="10" font-weight="700" fill="#475569">Audit entry missing</text>
    <text x="700" y="514" font-size="9" fill="#0f172a">→ stage 5 · forge installed? voice-audit verify</text>

    <text x="700" y="536" font-size="10" font-weight="700" fill="#475569">Two messages running interleaved in same chat</text>
    <text x="700" y="552" font-size="9" fill="#0f172a">→ stage 3 · per-chat lock; cross-chat allowed, intra-chat sequential</text>
  </g>
</svg>
