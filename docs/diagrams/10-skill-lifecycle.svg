<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Skill — lifecycle of one skill</title>
  <desc>Four phases of a skill in skill-forge. Create: skill_create input goes through the linter (NFKC + confusables, prompt-injection, persona-boundary, secrets), then writes the canonical workspace and (only for project/user scope) the engine-facing slot mirror, plus an audit entry. Inject: per bridge turn, collect_active_skills filters by Layer-14 LDD-toggle and grade-eligibility, sorts by mean_score, and lands the top-5 in the system prompt. Grade: after the turn, auto-grade matches name/body in output (score 0.7); on the next user message, outcome-grade detects approval (0.9), rejection (0.1), or rephrase (0.3). Promote: scope ladder with strict gates (≥1 positive grade for task→session, ≥3 grades and mean ≥0.5 for session→project, explicit force for project→user).</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Skill — lifecycle of one skill</text>
  <text x="550" y="52" text-anchor="middle" font-size="12" fill="#475569">Four phases: create · inject (per turn) · grade (auto + outcome) · promote (scope ladder)</text>

  <!-- Phase 1: Create -->
  <rect x="30" y="80" width="1040" height="170" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="106" font-size="14" font-weight="700" fill="#0f172a">Phase 1 — create</text>
  <text x="60" y="122" font-size="11" fill="#475569">Linter is fail-closed. Slot mirror only for project / user scope (cross-chat leak gate).</text>

  <rect x="60" y="145" width="160" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="140" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">mcp__skill_forge__</text>
  <text x="140" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">skill_create</text>

  <rect x="250" y="145" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="335" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">linter (fail-closed)</text>
  <text x="335" y="180" text-anchor="middle" font-size="9" fill="#475569">NFKC + confusables · prompt-inj</text>
  <text x="335" y="191" text-anchor="middle" font-size="9" fill="#475569">persona-boundary · secrets</text>

  <rect x="450" y="145" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="535" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">canonical write</text>
  <text x="535" y="180" text-anchor="middle" font-size="9" fill="#475569">&lt;scope&gt;/skill-forge/skills/</text>
  <text x="535" y="191" text-anchor="middle" font-size="9" fill="#475569">&lt;name&gt;/SKILL.md + meta.json</text>

  <rect x="650" y="145" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="735" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">slot mirror (gated)</text>
  <text x="735" y="180" text-anchor="middle" font-size="9" fill="#475569">project / user only</text>
  <text x="735" y="191" text-anchor="middle" font-size="9" fill="#475569">plugins/.../skills/dyn/&lt;n&gt;/</text>

  <rect x="850" y="145" width="170" height="50" rx="8" fill="#cffafe" stroke="#06b6d4"/>
  <text x="935" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">audit append</text>
  <text x="935" y="180" text-anchor="middle" font-size="9" fill="#0f172a">skill.created</text>
  <text x="935" y="191" text-anchor="middle" font-size="9" fill="#0f172a">(sha-chained)</text>

  <rect x="250" y="208" width="170" height="32" rx="6" fill="#fef2f2" stroke="#dc2626"/>
  <text x="335" y="227" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">linter reject → no write</text>

  <line x1="220" y1="170" x2="250" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="420" y1="170" x2="450" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="620" y1="170" x2="650" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="820" y1="170" x2="850" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="335" y1="195" x2="335" y2="208" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ar-red)"/>

  <!-- Phase 2: Inject -->
  <rect x="30" y="270" width="1040" height="170" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="296" font-size="14" font-weight="700" fill="#0f172a">Phase 2 — inject (per bridge turn)</text>
  <text x="60" y="312" font-size="11" fill="#475569">collect_active_skills runs once per inbox message. No caching — hot-reload on next turn.</text>

  <rect x="60" y="335" width="170" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="145" y="357" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">inbox message</text>
  <text x="145" y="372" text-anchor="middle" font-size="9" fill="#0f172a">collect_active_skills(...)</text>

  <rect x="260" y="335" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="345" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">walk scopes</text>
  <text x="345" y="370" text-anchor="middle" font-size="9" fill="#475569">task → session →</text>
  <text x="345" y="381" text-anchor="middle" font-size="9" fill="#475569">project → user</text>

  <rect x="460" y="335" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="545" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">filter</text>
  <text x="545" y="370" text-anchor="middle" font-size="9" fill="#475569">Layer-14 LDD-toggle</text>
  <text x="545" y="381" text-anchor="middle" font-size="9" fill="#475569">mean_score &gt; 0 (default)</text>

  <rect x="660" y="335" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="745" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">sort + cap</text>
  <text x="745" y="370" text-anchor="middle" font-size="9" fill="#475569">by mean_score desc</text>
  <text x="745" y="381" text-anchor="middle" font-size="9" fill="#475569">max_injected_skills (5)</text>

  <rect x="860" y="335" width="170" height="50" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="945" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">into prompt</text>
  <text x="945" y="370" text-anchor="middle" font-size="9" fill="#0f172a">--append-system-prompt</text>
  <text x="945" y="381" text-anchor="middle" font-size="9" fill="#0f172a">claude subprocess sees skills</text>

  <rect x="260" y="395" width="370" height="32" rx="6" fill="#fef2f2" stroke="#dc2626"/>
  <text x="445" y="414" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">profile.inject_skills = false → block omitted (e.g. forge / skill-forge personas)</text>

  <line x1="230" y1="360" x2="260" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="430" y1="360" x2="460" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="630" y1="360" x2="660" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="830" y1="360" x2="860" y2="360" stroke="#10b981" stroke-width="1.5" marker-end="url(#ar-green)"/>

  <!-- Phase 3: Grade -->
  <rect x="30" y="460" width="1040" height="220" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="486" font-size="14" font-weight="700" fill="#0f172a">Phase 3 — grade</text>
  <text x="60" y="502" font-size="11" fill="#475569">Two layers: auto-grade after turn, outcome-grade on next user follow-up. Both update meta.json.</text>

  <text x="60" y="528" font-size="12" font-weight="700" fill="#0e7490">Auto (Layer 7)</text>
  <rect x="60" y="540" width="170" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="145" y="562" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">reply emitted</text>
  <text x="145" y="577" text-anchor="middle" font-size="9" fill="#0f172a">auto_grade_from_output(...)</text>

  <rect x="260" y="540" width="170" height="50" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="345" y="561" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">match in output</text>
  <text x="345" y="575" text-anchor="middle" font-size="9" fill="#475569">name (under_/-/spaced)</text>
  <text x="345" y="586" text-anchor="middle" font-size="9" fill="#475569">or first 80 chars of body</text>

  <rect x="460" y="540" width="170" height="50" rx="8" fill="#cffafe" stroke="#06b6d4"/>
  <text x="545" y="561" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">grade 0.7</text>
  <text x="545" y="575" text-anchor="middle" font-size="9" fill="#0f172a">meta.json append</text>
  <text x="545" y="586" text-anchor="middle" font-size="9" fill="#0f172a">audit skill.graded</text>

  <line x1="230" y1="565" x2="260" y2="565" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="430" y1="565" x2="460" y2="565" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="660" y="528" font-size="12" font-weight="700" fill="#0e7490">Outcome (Layer 15)</text>
  <rect x="660" y="540" width="170" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="745" y="562" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">next user message</text>
  <text x="745" y="577" text-anchor="middle" font-size="9" fill="#0f172a">grade_from_user_followup</text>

  <rect x="860" y="540" width="170" height="50" rx="8" fill="#cffafe" stroke="#06b6d4"/>
  <text x="945" y="558" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">grade by signal</text>
  <text x="945" y="572" text-anchor="middle" font-size="9" fill="#0f172a">approval 0.9 · rejection 0.1</text>
  <text x="945" y="583" text-anchor="middle" font-size="9" fill="#0f172a">rephrase 0.3 (≥0.6 ratio)</text>

  <line x1="830" y1="565" x2="860" y2="565" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="60" y="610" width="970" height="55" rx="8" fill="#fff7ed" stroke="#fb923c"/>
  <text x="80" y="628" font-size="11" font-weight="700" fill="#9a3412">Snapshot hygiene</text>
  <text x="80" y="643" font-size="10" fill="#7c2d12">Outcome-grade reads _last_turn_skills[chat_key] one-shot. /reset, /cancel, and the periodic _cleanup_last_turn_skills</text>
  <text x="80" y="658" font-size="10" fill="#7c2d12">(default 300 s sweep) clear stale snapshots. TTL 30 min by ADAPTER_OUTCOME_SNAPSHOT_TTL.</text>

  <!-- Phase 4: Promote -->
  <rect x="30" y="700" width="1040" height="180" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="726" font-size="14" font-weight="700" fill="#0f172a">Phase 4 — promote (scope ladder)</text>
  <text x="60" y="742" font-size="11" fill="#475569">Stricter gates than forge tools, because skill content shapes the agent's reasoning. Linter re-runs on promote.</text>

  <rect x="60" y="760" width="200" height="100" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="160" y="784" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">task</text>
  <text x="160" y="804" text-anchor="middle" font-size="10" fill="#475569">≥ 1 positive grade</text>
  <text x="160" y="820" text-anchor="middle" font-size="9" fill="#0f172a">(score &gt; 0)</text>
  <text x="160" y="844" text-anchor="middle" font-size="9" fill="#94a3b8">no slot mirror</text>

  <rect x="320" y="760" width="200" height="100" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="420" y="784" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">session</text>
  <text x="420" y="804" text-anchor="middle" font-size="10" fill="#475569">≥ 3 grades</text>
  <text x="420" y="820" text-anchor="middle" font-size="10" fill="#475569">mean_score ≥ 0.5</text>
  <text x="420" y="844" text-anchor="middle" font-size="9" fill="#94a3b8">no slot mirror</text>

  <rect x="580" y="760" width="200" height="100" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="680" y="784" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">project</text>
  <text x="680" y="804" text-anchor="middle" font-size="10" fill="#475569">explicit force=True</text>
  <text x="680" y="820" text-anchor="middle" font-size="10" fill="#475569">PIN-elevation gate</text>
  <text x="680" y="844" text-anchor="middle" font-size="9" fill="#065f46">slot mirror written</text>

  <rect x="840" y="760" width="200" height="100" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="940" y="784" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">user</text>
  <text x="940" y="804" text-anchor="middle" font-size="10" fill="#475569">force=True (operator)</text>
  <text x="940" y="820" text-anchor="middle" font-size="10" fill="#475569">durable across all chats</text>
  <text x="940" y="844" text-anchor="middle" font-size="9" fill="#065f46">never TTL-purged</text>

  <line x1="260" y1="810" x2="320" y2="810" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="520" y1="810" x2="580" y2="810" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="780" y1="810" x2="840" y2="810" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Footnote -->
  <text x="550" y="894" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">Cyan = audit-emitting · Green = success path · Red = deny / block · Orange = lifecycle hygiene. Every event chains into the unified SHA-256 audit log.</text>
</svg>
