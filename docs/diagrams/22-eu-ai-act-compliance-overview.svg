  <title>EU AI Act 2026 — Corvin compliance overview</title>
  <desc>Mapping of EU AI Act 2026 articles to Corvin implementation layers. Corvin is classified as Limited Risk under Art. 50 + Art. 28-30. Each applicable article is enforced by a named code layer. The hash-chained audit spine unifies all compliance events.</desc>

