  <text x="490" y="609" text-anchor="middle" font-size="10" fill="#cbd5e1">Not Annex III · Not Art. 5 prohibited · Applicable: Art. 50 disclosure + content marking · Art. 14 oversight · Art. 28–30 deployer obligations · Art. 73 incidents</text>

