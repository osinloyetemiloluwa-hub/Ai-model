<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Capability-bundle hierarchy — Layer 18</title>
  <desc>Four roles in a strict authority pyramid: owner (intrinsic via channel whitelist), admin (delegated by owner; may delegate member/observer; cannot delegate admin — kerze rule), member (may trigger the bot, has a quota), observer (read-only; grants visibility via consent gate). Each layer lists capabilities and what it may delegate. The audit chain at the bottom records every grant, revoke, leave, and denied attempt.</desc>

  <text x="490" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Capability-bundle hierarchy — who may do what</text>
  <text x="490" y="52" text-anchor="middle" font-size="12" fill="#475569">Each role inherits NOTHING — capabilities are explicit per bundle. The pyramid only shows delegation reach.</text>

  <!-- Owner (top, smallest, most powerful) -->
  <polygon points="430,80 550,80 580,160 400,160" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="490" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">owner</text>
  <text x="490" y="135" text-anchor="middle" font-size="10" fill="#0f172a">intrinsic via channel whitelist</text>
  <text x="490" y="150" text-anchor="middle" font-size="10" fill="#0f172a">all capabilities · forge_promote · elevate_pin</text>

  <!-- Admin -->
  <polygon points="380,160 600,160 640,250 340,250" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">admin</text>
  <text x="490" y="215" text-anchor="middle" font-size="10" fill="#0f172a">delegate_member · delegate_observer · audit_chat</text>
  <text x="490" y="230" text-anchor="middle" font-size="10" fill="#0f172a">all tools · personas_pin · revoke_subordinate</text>
  <text x="490" y="244" text-anchor="middle" font-size="9" fill="#7c2d12">cannot grant admin (kerze rule)</text>

  <!-- Member -->
  <polygon points="320,250 660,250 700,360 280,360" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="490" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">member</text>
  <text x="490" y="305" text-anchor="middle" font-size="10" fill="#0f172a">trigger · tools_basic · audit_self</text>
  <text x="490" y="320" text-anchor="middle" font-size="10" fill="#0f172a">personas_pin_turn (own turn only)</text>
  <text x="490" y="338" text-anchor="middle" font-size="9" fill="#7c2d12">100 msg/day · 20k tokens/day (default; per-uid override)</text>
  <text x="490" y="352" text-anchor="middle" font-size="9" fill="#7c2d12">cannot delegate · cannot revoke</text>

  <!-- Observer -->
  <polygon points="260,360 720,360 760,490 220,490" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="490" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">observer</text>
  <text x="490" y="415" text-anchor="middle" font-size="10" fill="#0f172a">audit_self only</text>
  <text x="490" y="430" text-anchor="middle" font-size="10" fill="#0f172a">no trigger · no tools · no delegation</text>
  <text x="490" y="450" text-anchor="middle" font-size="9" fill="#7c2d12">paired with consent.granted (Layer 16 Phase 4)</text>
  <text x="490" y="464" text-anchor="middle" font-size="9" fill="#7c2d12">may /propose to stack (Layer 21) — owner triggers via /go</text>
  <text x="490" y="478" text-anchor="middle" font-size="9" fill="#7c2d12">self-grant via /join (only allowed self-grant path)</text>

  <!-- Authority arrows on the right side -->
  <g>
    <text x="780" y="105" font-size="11" font-weight="700" fill="#0f172a">grant authority</text>
    <line x1="585" y1="120" x2="640" y2="200" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#arr)"/>
    <text x="650" y="170" font-size="9" fill="#92400e">owner → admin</text>

    <line x1="635" y1="220" x2="690" y2="305" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#arr)"/>
    <text x="700" y="265" font-size="9" fill="#92400e">owner → member</text>

    <line x1="685" y1="335" x2="745" y2="420" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#arr)"/>
    <text x="755" y="385" font-size="9" fill="#92400e">owner → observer</text>

    <line x1="640" y1="240" x2="690" y2="305" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
    <text x="755" y="305" font-size="9" fill="#1e40af">admin → member</text>

    <line x1="690" y1="335" x2="745" y2="420" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
    <text x="755" y="425" font-size="9" fill="#1e40af">admin → observer</text>
  </g>

  <!-- Self-join arrow on the left -->
  <g>
    <text x="60" y="105" font-size="11" font-weight="700" fill="#0f172a">self-onboarding</text>
    <path d="M 200 120 Q 150 250 215 425" stroke="#9333ea" stroke-width="1.8" fill="none" stroke-dasharray="4,3" marker-end="url(#arr3)"/>
    <text x="50" y="270" font-size="9" fill="#6b21a8">stranger → /join</text>
    <text x="50" y="285" font-size="9" fill="#6b21a8">→ observer</text>
    <text x="50" y="300" font-size="9" fill="#475569">(only allowed</text>
    <text x="50" y="312" font-size="9" fill="#475569">self-grant path)</text>
  </g>

  <!-- Whitelist note (top left) -->
  <rect x="40" y="80" width="170" height="55" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1"/>
  <text x="50" y="100" font-size="10" font-weight="700" fill="#0f172a">whitelist (settings.json)</text>
  <text x="50" y="115" font-size="9" fill="#475569">only direct path TO/FROM owner</text>
  <text x="50" y="128" font-size="9" fill="#475569">/grant cannot create owners</text>

  <!-- TTL/quota box (right) -->
  <rect x="800" y="475" width="160" height="80" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1"/>
  <text x="810" y="495" font-size="10" font-weight="700" fill="#0f172a">TTL contract</text>
  <text x="810" y="510" font-size="9" fill="#475569">default 7d (clamped 60s..30d)</text>
  <text x="810" y="525" font-size="9" fill="#475569">never/forever opt-in</text>
  <text x="810" y="540" font-size="9" fill="#475569">lazy-prune on every read</text>
  <text x="810" y="552" font-size="9" fill="#475569">+ grant.expired audit</text>

  <!-- Slash command quick-reference -->
  <rect x="60" y="520" width="860" height="100" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="544" font-size="12" font-weight="700" fill="#0f172a">slash-commands (Layer 18)</text>
  <text x="80" y="563" font-size="10" fill="#475569"><tspan font-weight="600" fill="#0f172a">/grant &lt;uid&gt; &lt;bundle&gt; [&lt;ttl&gt;] [&lt;reason&gt;]</tspan>  — owner/admin · respects authority matrix</text>
  <text x="80" y="580" font-size="10" fill="#475569"><tspan font-weight="600" fill="#0f172a">/revoke &lt;uid&gt;</tspan>  — owner→any non-owner · admin→subordinate only</text>
  <text x="80" y="597" font-size="10" fill="#475569"><tspan font-weight="600" fill="#0f172a">/role [uid]</tspan>  — show role + capabilities (others: owner/admin only)</text>
  <text x="80" y="614" font-size="10" fill="#475569"><tspan font-weight="600" fill="#0f172a">/roles · /leave</tspan>  — full chat overview · self-revoke (owners can't leave; whitelist edit required)</text>

  <!-- Audit log band -->
  <rect x="60" y="635" width="860" height="68" rx="10" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <text x="80" y="660" font-size="14" font-weight="700" fill="#22d3ee">audit chain — every authority change is recorded</text>
  <text x="80" y="680" font-size="10" fill="#cbd5e1">grant.issued · grant.denied · grant.revoked · grant.left · grant.revoke_denied · grant.expired (lazy prune)</text>
  <text x="80" y="697" font-size="10" fill="#94a3b8">SHA-256-chained file at &lt;corvin_home&gt;/global/forge/audit.jsonl — voice-audit verify walks the chain</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#9333ea"/>
    </marker>
  </defs>
</svg>
