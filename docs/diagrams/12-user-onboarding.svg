<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>User onboarding lifecycle — Layer 19 + Layer 16 Phase 4</title>
  <desc>The journey of a new participant in a chat from first contact to a stable role. Step 1: first message arrives at the daemon, which checks the disclosure store; if the uid is unseen, the bot-disclosure card is shown once. Step 2: the user picks an action — /join (self-grant observer), /pass (acknowledge without role), or /consent on (allow read-only-side messages to flow into owner turns). Step 3: each action creates a different audit trail and store state. The owner can later promote via /grant. Every step is recorded in the unified hash chain.</desc>

  <text x="490" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">User onboarding — from first contact to stable role</text>
  <text x="490" y="52" text-anchor="middle" font-size="12" fill="#475569">The disclosure card is shown ONCE per (chat, uid). Every action is identity-bound — no consent on someone else's behalf.</text>

  <!-- Step 1: First contact -->
  <rect x="30" y="90" width="220" height="120" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">1 · First contact</text>
  <text x="50" y="138" font-size="10" fill="#0f172a">A new uid types in the chat.</text>
  <text x="50" y="155" font-size="10" fill="#0f172a">Daemon → has_seen() check.</text>
  <text x="50" y="175" font-size="10" fill="#0f172a">If unseen → render card,</text>
  <text x="50" y="190" font-size="10" fill="#0f172a">mark_seen(action="pending").</text>
  <text x="50" y="205" font-size="9" fill="#7c2d12">audit: disclosure.shown</text>

  <!-- Step 2: Disclosure card -->
  <rect x="290" y="90" width="400" height="120" rx="10" fill="#fff" stroke="#0f172a" stroke-width="2"/>
  <text x="490" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">2 · Disclosure card (≤ 1500 chars)</text>
  <text x="310" y="138" font-size="10" fill="#0f172a">"Hi! Here is an AI bot, run by &lt;owner&gt;.</text>
  <text x="310" y="153" font-size="10" fill="#0f172a">  • What it can do · how the audit works.</text>
  <text x="310" y="168" font-size="10" fill="#0f172a">  • If you do nothing: silent. Default.</text>
  <text x="310" y="186" font-size="10" fill="#0f172a">  Choose: /join (observer) · /consent on</text>
  <text x="310" y="201" font-size="10" fill="#0f172a">          /pass (ack only) · /leave"</text>

  <!-- Step 3a: /join -->
  <rect x="30" y="260" width="220" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">3a · /join</text>
  <text x="50" y="306" font-size="10" fill="#0f172a">Self-grant observer</text>
  <text x="50" y="321" font-size="10" fill="#0f172a">(only allowed self-grant).</text>
  <text x="50" y="340" font-size="10" fill="#0f172a">→ visible in /roles</text>
  <text x="50" y="355" font-size="10" fill="#0f172a">→ owner may promote</text>
  <text x="50" y="372" font-size="9" fill="#7c2d12">audit: disclosure.joined</text>

  <!-- Step 3b: /consent on -->
  <rect x="280" y="260" width="220" height="120" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">3b · /consent on</text>
  <text x="300" y="306" font-size="10" fill="#0f172a">Read-only-side messages</text>
  <text x="300" y="321" font-size="10" fill="#0f172a">flow into owner's NEXT turn</text>
  <text x="300" y="336" font-size="10" fill="#0f172a">as ambient context (Phase 2).</text>
  <text x="300" y="354" font-size="10" fill="#0f172a">/consent 1h · /consent 7d</text>
  <text x="300" y="372" font-size="9" fill="#7c2d12">audit: consent.granted</text>

  <!-- Step 3c: /pass -->
  <rect x="530" y="260" width="220" height="120" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="640" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">3c · /pass</text>
  <text x="550" y="306" font-size="10" fill="#0f172a">Acknowledged but no action.</text>
  <text x="550" y="321" font-size="10" fill="#0f172a">No role · no consent.</text>
  <text x="550" y="336" font-size="10" fill="#0f172a">Card not shown again.</text>
  <text x="550" y="354" font-size="10" fill="#0f172a">May still /propose to stack.</text>
  <text x="550" y="372" font-size="9" fill="#7c2d12">audit: disclosure.action(passed)</text>

  <!-- Step 3d: silent (default) -->
  <rect x="780" y="260" width="180" height="120" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="870" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">3d · do nothing</text>
  <text x="800" y="306" font-size="10" fill="#0f172a">Silent default.</text>
  <text x="800" y="321" font-size="10" fill="#0f172a">Messages dropped.</text>
  <text x="800" y="336" font-size="10" fill="#0f172a">Bot doesn't reply.</text>
  <text x="800" y="354" font-size="10" fill="#0f172a">Visible in chat,</text>
  <text x="800" y="368" font-size="10" fill="#0f172a">invisible to LLM.</text>

  <!-- Step 4: Owner promotion path -->
  <rect x="60" y="430" width="860" height="90" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="80" y="454" font-size="13" font-weight="700" fill="#9a3412">4 · Owner-driven promotion (any time)</text>
  <text x="80" y="475" font-size="10" fill="#0f172a"><tspan font-weight="600">/grant &lt;uid&gt; member 7d "vacation cover"</tspan>  — observer or stranger gains trigger rights, quota applies</text>
  <text x="80" y="492" font-size="10" fill="#0f172a"><tspan font-weight="600">/grant &lt;uid&gt; admin 30d</tspan>  — full delegation reach (cannot grant admin further: kerze rule)</text>
  <text x="80" y="509" font-size="10" fill="#0f172a"><tspan font-weight="600">/revoke &lt;uid&gt;</tspan>  — drop the role; user falls back to disclosure-state (joined/passed/silent)</text>

  <!-- Arrows from card to options -->
  <line x1="350" y1="210" x2="200" y2="260" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="450" y1="210" x2="380" y2="260" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="550" y1="210" x2="640" y2="260" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="650" y1="210" x2="850" y2="260" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- Arrows from options to promotion -->
  <line x1="140" y1="380" x2="140" y2="430" stroke="#475569" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="390" y1="380" x2="390" y2="430" stroke="#475569" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="640" y1="380" x2="640" y2="430" stroke="#475569" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="870" y1="380" x2="870" y2="430" stroke="#475569" stroke-width="1.3" stroke-dasharray="4,3"/>

  <!-- Arrow from step 1 to step 2 -->
  <line x1="250" y1="150" x2="290" y2="150" stroke="#0f172a" stroke-width="1.8" marker-end="url(#a5)"/>

  <!-- Identity binding box (right side) -->
  <rect x="290" y="540" width="400" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="310" y="562" font-size="11" font-weight="700" fill="#854d0e">Identity binding (load-bearing invariant)</text>
  <text x="310" y="580" font-size="10" fill="#0f172a">Every action carries the platform uid: Telegram msg.from.id, Discord message.author.id,</text>
  <text x="310" y="595" font-size="10" fill="#0f172a">WhatsApp m.key.participant, Teams UPN, Signal E.164 number.</text>
  <text x="310" y="611" font-size="10" fill="#0f172a">No consent on someone else's behalf — slash runs in the actor's own message.</text>

  <!-- Audit chain band -->
  <rect x="60" y="635" width="860" height="68" rx="10" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <text x="80" y="660" font-size="14" font-weight="700" fill="#22d3ee">audit trail (one chain, scoped views)</text>
  <text x="80" y="680" font-size="10" fill="#cbd5e1">disclosure.shown · disclosure.joined · disclosure.action · consent.granted · consent.revoked · grant.issued · grant.revoked</text>
  <text x="80" y="697" font-size="10" fill="#94a3b8">/audit me — your own events  ·  /audit chat — chat-wide (owner/admin)  ·  voice-audit verify — chain integrity</text>

  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#0f172a"/>
    </marker>
    <marker id="a5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
