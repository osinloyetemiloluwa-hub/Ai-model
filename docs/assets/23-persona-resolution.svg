<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg23" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrGray23" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#484f58"/>
    </marker>
  </defs>

  <rect width="900" height="140" rx="10" fill="url(#bg23)"/>

  <!-- Title -->
  <text x="450" y="24" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#8b949e" letter-spacing="2">PERSONA RESOLUTION — PRIORITY CHAIN</text>

  <!-- ═══ Box 1: explicit /persona pin (purple) ═══ -->
  <rect x="40" y="42" width="230" height="60" rx="8"
        fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="155" y="69" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#a78bfa">explicit /persona pin</text>
  <text x="155" y="88" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#8b949e">highest priority</text>

  <!-- Arrow 1 → 2 -->
  <line x1="278" y1="72" x2="328" y2="72" stroke="#484f58" stroke-width="1.8" marker-end="url(#arrGray23)"/>
  <text x="303" y="65" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#6b7280">fallback</text>

  <!-- ═══ Box 2: chat_profile.persona (blue) ═══ -->
  <rect x="336" y="42" width="260" height="60" rx="8"
        fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="466" y="69" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#3b82f6">chat_profile.persona</text>
  <text x="466" y="88" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#8b949e">per-chat profile override</text>

  <!-- Arrow 2 → 3 -->
  <line x1="604" y1="72" x2="652" y2="72" stroke="#484f58" stroke-width="1.8" marker-end="url(#arrGray23)"/>
  <text x="628" y="65" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#6b7280">fallback</text>

  <!-- ═══ Box 3: auto-router (green) ═══ -->
  <rect x="660" y="42" width="200" height="60" rx="8"
        fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="760" y="69" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#3fb950">auto-router</text>
  <text x="760" y="88" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#8b949e">keyword/LLM routing</text>

  <!-- Right label -->
  <text x="872" y="75" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="9" fill="#6b7280">lowest</text>
  <text x="872" y="87" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="9" fill="#6b7280">priority</text>
</svg>
