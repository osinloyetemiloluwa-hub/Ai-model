<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgCA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0d0800"/>
    </linearGradient>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0b429"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrBlueRev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="900" height="420" rx="10" fill="url(#bgCA)"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#8b949e" letter-spacing="2">COMPUTE WORKER — ARCHITECTURE</text>

  <!-- ═══ ZONE 1: LLM (blue, left) ═══ -->
  <rect x="12" y="46" width="168" height="310" rx="8" fill="#0a0f1a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="96" y="66" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700" fill="#93c5fd">LLM</text>
  <text x="96" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">chat ↔ MCP calls</text>

  <line x1="28" y1="96" x2="160" y2="96" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 3 MCP calls -->
  <rect x="24" y="105" width="148" height="38" rx="5" fill="#0d1f3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="98" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#93c5fd">compute_run</text>
  <text x="98" y="135" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">submit job · returns immediately</text>

  <rect x="24" y="151" width="148" height="38" rx="5" fill="#0d1f3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="98" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#93c5fd">compute_status</text>
  <text x="98" y="181" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">poll Top-K progress</text>

  <rect x="24" y="197" width="148" height="38" rx="5" fill="#0d1f3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="98" y="212" text-anchor="middle" font-family="monospace" font-size="9" fill="#93c5fd">compute_result</text>
  <text x="98" y="227" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">fetch best_params + loss</text>

  <rect x="24" y="243" width="148" height="30" rx="5" fill="#0d1f3a" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="98" y="261" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">compute_abort</text>

  <line x1="28" y1="283" x2="160" y2="283" stroke="#1e3a5f" stroke-width="1"/>
  <text x="96" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3b82f6">3 calls total</text>
  <text x="96" y="316" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">for any N-iter sweep</text>
  <text x="96" y="336" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">no tokens burned</text>
  <text x="96" y="352" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">during execution</text>

  <!-- Arrow LLM → socket -->
  <line x1="180" y1="200" x2="222" y2="200"
        stroke="#3b82f6" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="201" y="192" text-anchor="middle" font-family="monospace" font-size="7" fill="#3b82f6">MCP</text>

  <!-- Arrow socket → LLM (return) -->
  <line x1="222" y1="218" x2="180" y2="218"
        stroke="#3fb950" stroke-width="2" marker-end="url(#arrBlueRev)"/>
  <text x="201" y="234" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">Top-K</text>

  <!-- ═══ ZONE 2: Unix Socket / Transport (narrow) ═══ -->
  <rect x="224" y="160" width="58" height="90" rx="6" fill="#0d1117" stroke="#484f58" stroke-width="1.2"/>
  <text x="253" y="180" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">worker</text>
  <text x="253" y="192" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">.sock</text>
  <text x="253" y="210" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">Unix</text>
  <text x="253" y="222" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">socket</text>
  <text x="253" y="237" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">IPC</text>

  <!-- Arrow socket → worker -->
  <line x1="282" y1="205" x2="318" y2="205"
        stroke="#f0b429" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- ═══ ZONE 3: Compute Worker (amber, large center) ═══ -->
  <rect x="320" y="46" width="308" height="310" rx="8" fill="url(#workerGrad)" stroke="#f0b429" stroke-width="1.8"/>

  <text x="474" y="68" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700" fill="#f0b429">Compute Worker</text>
  <text x="474" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">corvin_compute · asyncio unix-socket daemon</text>

  <line x1="336" y1="94" x2="612" y2="94" stroke="#2a1800" stroke-width="1"/>

  <!-- ParallelDriver box -->
  <rect x="332" y="100" width="288" height="56" rx="5" fill="#1a1000" stroke="#f0b429" stroke-width="1"/>
  <text x="476" y="116" text-anchor="middle" font-family="monospace" font-size="9" fill="#fcd34d">ParallelDriver</text>
  <text x="476" y="131" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">ThreadPoolExecutor · max_parallel_iterations</text>
  <text x="476" y="147" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">batch suggest → evaluate → update loop</text>

  <!-- Strategy pills -->
  <text x="342" y="172" font-family="sans-serif" font-size="9" fill="#8b949e">Strategy:</text>
  <rect x="400" y="160" width="46" height="20" rx="10" fill="#0d1117" stroke="#fcd34d" stroke-width="1"/>
  <text x="423" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#fcd34d">grid</text>
  <rect x="452" y="160" width="56" height="20" rx="10" fill="#0d1117" stroke="#fcd34d" stroke-width="1"/>
  <text x="480" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#fcd34d">random</text>
  <rect x="514" y="160" width="66" height="20" rx="10" fill="#0d1117" stroke="#fcd34d" stroke-width="1"/>
  <text x="547" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#fcd34d">bayesian</text>
  <rect x="586" y="160" width="36" height="20" rx="10" fill="#0d1117" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="604" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa">+ext</text>

  <!-- Budget box -->
  <rect x="332" y="188" width="136" height="72" rx="5" fill="#1a1000" stroke="#f0b429" stroke-width="0.8"/>
  <text x="400" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#fcd34d">Budget</text>
  <text x="342" y="221" font-family="sans-serif" font-size="8" fill="#8b949e">max_iterations</text>
  <text x="342" y="235" font-family="sans-serif" font-size="8" fill="#8b949e">max_wall_clock_s</text>
  <text x="342" y="249" font-family="sans-serif" font-size="8" fill="#8b949e">stall detection</text>

  <!-- RunStore box -->
  <rect x="476" y="188" width="144" height="72" rx="5" fill="#1a1000" stroke="#f0b429" stroke-width="0.8"/>
  <text x="548" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#fcd34d">RunStore</text>
  <text x="488" y="221" font-family="sans-serif" font-size="8" fill="#8b949e">runs/&lt;id&gt;/manifest.json</text>
  <text x="488" y="235" font-family="sans-serif" font-size="8" fill="#8b949e">iterations/0001.json</text>
  <text x="488" y="249" font-family="sans-serif" font-size="8" fill="#6b7280">crash-safe · append-only</text>

  <!-- Iteration flow row -->
  <rect x="332" y="268" width="288" height="52" rx="5" fill="#150f00" stroke="#f0b429" stroke-width="0.8"/>
  <text x="476" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">iter 1</text>
  <text x="476" y="299" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">suggest → forge_call → loss ↓</text>
  <text x="476" y="312" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">… repeat N times out of LLM loop …</text>

  <!-- Recovery note -->
  <text x="474" y="338" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">crash recovery: resumes from max(iter)+1 on restart</text>
  <text x="474" y="352" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">MUST NOT import anthropic · zero LLM tokens during execution</text>

  <!-- Arrow worker → forge -->
  <line x1="628" y1="205" x2="668" y2="205"
        stroke="#a78bfa" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="648" y="196" text-anchor="middle" font-family="monospace" font-size="7" fill="#a78bfa">forge</text>
  <text x="648" y="220" text-anchor="middle" font-family="monospace" font-size="7" fill="#a78bfa">call</text>

  <!-- Arrow forge → worker (loss back) -->
  <line x1="668" y1="224" x2="628" y2="224"
        stroke="#3fb950" stroke-width="2" marker-end="url(#arrAmber)"/>
  <text x="648" y="238" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">scalar</text>
  <text x="648" y="248" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">loss</text>

  <!-- ═══ ZONE 4: Forge Sandbox (purple, right) ═══ -->
  <rect x="670" y="46" width="218" height="310" rx="8" fill="#0d0d1a" stroke="#a78bfa" stroke-width="1.5"/>

  <text x="779" y="66" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700" fill="#a78bfa">Forge Sandbox</text>
  <text x="779" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">bwrap · no network · fresh /tmp</text>

  <line x1="686" y1="94" x2="872" y2="94" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Tool execution box -->
  <rect x="682" y="101" width="198" height="60" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="781" y="117" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">Forged Tool</text>
  <text x="781" y="132" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Python · stdlib · pandas · DuckDB</text>
  <text x="781" y="147" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">run_tool() via forge MCP server</text>

  <!-- Dataset ro-bind -->
  <rect x="682" y="170" width="198" height="56" rx="5" fill="#0d0d1a" stroke="#a78bfa" stroke-width="0.8"/>
  <!-- cylinder shape -->
  <rect x="712" y="182" width="138" height="28" rx="3" fill="#1a1a2e" stroke="#a78bfa" stroke-width="0.8"/>
  <ellipse cx="781" cy="182" rx="69" ry="10" fill="#252545" stroke="#a78bfa" stroke-width="0.8"/>
  <ellipse cx="781" cy="210" rx="69" ry="10" fill="#1a1a2e" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="781" y="201" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">dataset</text>
  <text x="781" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">ro-bind mount · full data · stays on disk</text>

  <!-- Returns scalar -->
  <rect x="682" y="236" width="198" height="48" rx="5" fill="#0c1a0c" stroke="#3fb950" stroke-width="1"/>
  <text x="781" y="254" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">returns scalar loss</text>
  <text x="781" y="268" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">stdout → worker · JSON</text>
  <text x="781" y="280" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">param_fingerprint in audit only</text>

  <!-- path gate note -->
  <rect x="682" y="293" width="198" height="38" rx="5" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="781" y="308" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fca5a5">path-gate (L10) protects</text>
  <text x="781" y="321" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fca5a5">compute/** + worker.sock</text>

  <!-- Audit note at bottom -->
  <text x="450" y="380" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#484f58">Audit chain: param_fingerprint (sha256:16-char) only · zero raw values · metadata-only per-iteration events</text>
  <text x="450" y="397" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" fill="#484f58">Worker never auto-starts · opt-in per tenant (spec.compute.enabled: true) · systemd-user template unit</text>
</svg>
