<svg width="900" height="230" viewBox="0 0 900 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrFF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrGoldFF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0b429"/>
    </marker>
    <linearGradient id="goldGFF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c97800"/>
    </linearGradient>
  </defs>

  <rect width="900" height="230" rx="10" fill="url(#bgFF)"/>
  <rect x="0" y="0" width="4" height="230" rx="2" fill="url(#goldGFF)"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#8b949e" letter-spacing="2">FORGE TOOL LIFECYCLE</text>

  <!-- Box 1: Chat-Prompt (gold) -->
  <rect x="20"  y="52" width="148" height="74" rx="8" fill="#1f2937" stroke="#f0b429" stroke-width="1.5"/>
  <rect x="20"  y="52" width="148" height="3"  rx="2" fill="#f0b429" opacity="0.8"/>
  <text x="94"  y="82"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#f0b429">Chat Prompt</text>
