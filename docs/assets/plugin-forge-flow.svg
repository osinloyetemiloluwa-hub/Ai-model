  <text x="94"  y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">Description +</text>
  <text x="94"  y="161" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">parameter schema</text>
  <text x="270" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">name-gate · linter</text>
  <text x="270" y="161" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">policy hot-reload</text>
  <text x="446" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">secrets via vault</text>
  <text x="446" y="161" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">env-inject (bwrap)</text>
  <text x="622" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">forge.created event</text>
  <text x="622" y="161" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">tamper-evident</text>
  <text x="802" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">same turn, all</text>
  <text x="802" y="161" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">personas can use</text>

  <!-- Scope label -->
  <text x="390" y="200"
        font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e">Scope:</text>
  <text x="430" y="200"
        font-family="'SFMono-Regular', Consolas, monospace" font-size="11" fill="#f0b429">task</text>
  <text x="462" y="200"
        font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e">·</text>
  <text x="475" y="200"
        font-family="'SFMono-Regular', Consolas, monospace" font-size="11" fill="#3b82f6">session</text>
  <text x="528" y="200"
        font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e">·</text>
  <text x="541" y="200"
        font-family="'SFMono-Regular', Consolas, monospace" font-size="11" fill="#a78bfa">project</text>
  <text x="595" y="200"
        font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e">·</text>
  <text x="608" y="200"
        font-family="'SFMono-Regular', Consolas, monospace" font-size="11" fill="#f0b429">user</text>
  <text x="637" y="200"
        font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e">  (tool lifetime)</text>
</svg>
