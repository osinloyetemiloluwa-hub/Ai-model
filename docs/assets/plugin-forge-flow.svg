  <text x="622" y="82"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#3fb950">audit.jsonl</text>
  <text x="622" y="98"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">hash-chained</text>
  <text x="622" y="113" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">GDPR Art. 30/32</text>

  <!-- Arrow 4 (gold, success) -->
  <line x1="697" y1="89" x2="722" y2="89" stroke="#f0b429" stroke-width="1.5" marker-end="url(#arrGoldFF)"/>

  <!-- Box 5: Tool Active (gold) -->
  <rect x="724" y="52" width="156" height="74" rx="8" fill="#1f2937" stroke="#f0b429" stroke-width="2"/>
  <rect x="724" y="52" width="156" height="3"  rx="2" fill="#f0b429"/>
  <text x="802" y="78"  text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="700" fill="#f0b429">mcp__forge__</text>
  <text x="802" y="93"  text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="700" fill="#f0b429">code_name</text>
  <text x="802" y="111" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#3fb950">✓ callable immediately</text>

