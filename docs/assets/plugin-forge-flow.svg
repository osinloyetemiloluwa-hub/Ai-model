  <text x="94"  y="113" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">the tool</text>

  <!-- Arrow 1 -->
  <line x1="169" y1="89" x2="194" y2="89" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrFF)"/>

  <!-- Box 2: forge_tool() (blue) -->
  <rect x="196" y="52" width="148" height="74" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="196" y="52" width="148" height="3"  rx="2" fill="#3b82f6" opacity="0.8"/>
  <text x="270" y="82"  text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="11" font-weight="700" fill="#3b82f6">forge_tool()</text>
  <text x="270" y="98"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">MCP server</text>
  <text x="270" y="113" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">validate schema</text>

  <!-- Arrow 2 -->
  <line x1="345" y1="89" x2="370" y2="89" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrFF)"/>

  <!-- Box 3: Sandbox (purple) -->
  <rect x="372" y="52" width="148" height="74" rx="8" fill="#1f2937" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="372" y="52" width="148" height="3"  rx="2" fill="#a78bfa" opacity="0.8"/>
