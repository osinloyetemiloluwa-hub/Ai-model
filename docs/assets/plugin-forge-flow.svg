  <text x="446" y="98"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">bwrap · no network</text>
  <text x="446" y="113" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">ro /usr · fresh /tmp</text>

  <!-- Arrow 3 -->
  <line x1="521" y1="89" x2="546" y2="89" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrFF)"/>

  <!-- Box 4: Audit (green) -->
  <rect x="548" y="52" width="148" height="74" rx="8" fill="#1f2937" stroke="#3fb950" stroke-width="1.5"/>
