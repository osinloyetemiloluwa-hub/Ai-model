  <!-- Claude Code: center=312 -->
  <rect x="228" y="250" width="168" height="50" rx="8" fill="#1f2937" stroke="#d97706" stroke-width="1.5"/>
  <text x="312" y="271" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#d97706">Claude Code</text>
  <text x="312" y="289" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">full feature set</text>

  <!-- Codex CLI: center=504 -->
  <rect x="420" y="250" width="168" height="50" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="504" y="271" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#3b82f6">Codex CLI</text>
  <text x="504" y="289" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">OpenAI · gpt-4o / gpt-5</text>

  <!-- OpenCode: center=696 -->
  <rect x="612" y="250" width="168" height="50" rx="8" fill="#1f2937" stroke="#3fb950" stroke-width="1.5"/>
  <text x="696" y="271" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#3fb950">OpenCode</text>
  <text x="696" y="289" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">Ollama · OpenRouter · …</text>

