  <!-- Row 1 -->
  <rect x="190" y="211" width="90"  height="20" rx="10" fill="#0d1117"/>
  <text x="235" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">whitelist ACL</text>
  <rect x="288" y="211" width="98"  height="20" rx="10" fill="#0d1117"/>
  <text x="337" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">per-chat profile</text>
  <rect x="394" y="211" width="90"  height="20" rx="10" fill="#0d1117"/>
  <text x="439" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">auto-routing</text>
  <rect x="492" y="211" width="98"  height="20" rx="10" fill="#0d1117"/>
  <text x="541" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">persona merge</text>
  <rect x="598" y="211" width="98"  height="20" rx="10" fill="#0d1117"/>
  <text x="647" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">consent gate</text>
  <!-- Row 2 -->
  <rect x="190" y="237" width="90"  height="20" rx="10" fill="#0d1117"/>
  <text x="235" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">TTS voice</text>
  <rect x="288" y="237" width="98"  height="20" rx="10" fill="#0d1117"/>
  <text x="337" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">skill grading</text>
  <rect x="394" y="237" width="90"  height="20" rx="10" fill="#0d1117"/>
  <text x="439" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">audit chain</text>
  <rect x="492" y="237" width="98"  height="20" rx="10" fill="#0d1117"/>
  <text x="541" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">quota · roles</text>
  <rect x="598" y="237" width="98"  height="20" rx="10" fill="#0d1117"/>
  <text x="647" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">path-gate hook</text>
  <text x="450" y="305" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#6e7681">per-chat-sequential · cross-chat-parallel</text>

  <!-- MCP Plugins (also inside the CorvinOS boundary) -->
  <rect x="850" y="180" width="195" height="140" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="947" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="1">MCP PLUGINS</text>
  <rect x="862" y="206" width="171" height="22" rx="6" fill="#1f2937" stroke="#f0b429" stroke-width="1"/>
  <text x="947" y="221" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f0b429">⚙ Forge</text>
  <rect x="862" y="234" width="171" height="22" rx="6" fill="#1f2937" stroke="#a78bfa" stroke-width="1"/>
  <text x="947" y="249" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a78bfa">✦ SkillForge</text>
  <rect x="862" y="262" width="171" height="22" rx="6" fill="#1f2937" stroke="#3fb950" stroke-width="1"/>
  <text x="947" y="277" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3fb950">◎ Recall</text>
  <rect x="862" y="290" width="171" height="22" rx="6" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="947" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">⊞ Compute</text>

  <!-- Dotted connector adapter → plugins -->
  <line x1="835" y1="250" x2="850" y2="250" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══════════════ Protocol boundary — CorvinOS → Worker Engines ═══════════════ -->
  <line x1="504" y1="338" x2="504" y2="373" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrBlue)"/>
  <rect x="356" y="347" width="296" height="20" rx="10" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="504" y="361" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#58a6ff" letter-spacing="0.3">WorkerEngine protocol</text>

  <!-- ═══════════════ Worker Engines — outer boundary (pluggable, swappable) ═══════════════ -->
  <rect x="35" y="378" width="1030" height="140" rx="12" fill="#11151c" stroke="#58a6ff" stroke-width="2"/>
  <text x="60" y="403"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="800" letter-spacing="0.5" fill="#58a6ff">Worker Engines</text>
  <text x="60" y="419" font-family="sans-serif" font-size="9.5" fill="#8b949e">swappable LLM backends — CorvinOS never changes to add one</text>

  <!-- Claude Code -->
  <rect x="65"  y="428" width="172" height="72" rx="8" fill="#1f2937" stroke="#d97706" stroke-width="1.5"/>
  <text x="151" y="453" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#d97706">Claude Code</text>
  <text x="151" y="471" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">full feature set</text>
  <text x="151" y="486" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">OAuth · Max</text>

  <!-- Codex CLI -->
  <rect x="252" y="428" width="172" height="72" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="338" y="453" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#3b82f6">Codex CLI</text>
  <text x="338" y="471" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">OpenAI</text>
  <text x="338" y="486" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">gpt-4o / gpt-5</text>

  <!-- OpenCode -->
  <rect x="439" y="428" width="172" height="72" rx="8" fill="#1f2937" stroke="#3fb950" stroke-width="1.5"/>
  <text x="525" y="453" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#3fb950">OpenCode</text>
  <text x="525" y="471" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">Ollama · OpenRouter</text>
  <text x="525" y="486" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">bring-your-own-model</text>

  <!-- Copilot CLI -->
  <rect x="626" y="428" width="172" height="72" rx="8" fill="#1f2937" stroke="#8957e5" stroke-width="1.5"/>
  <text x="712" y="453" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#8957e5">Copilot CLI</text>
  <text x="712" y="471" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">GitHub</text>
  <text x="712" y="486" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">Copilot subscription</text>

  <!-- Hermes -->
  <rect x="813" y="428" width="172" height="72" rx="8" fill="#1f2937" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="899" y="453" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#06b6d4">Hermes</text>
  <text x="899" y="471" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">Ollama · local</text>
  <text x="899" y="486" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#8b949e">zero-config default</text>

  <!-- Label bottom -->
  <text x="550" y="545"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" fill="#484f58">
    CorvinOS (audit, TTS, grading, compliance) is identical for every engine — swap the worker without touching the OS
  </text>
</svg>
