  <rect x="930" y="130" width="142" height="170" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="1001" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="1">MCP PLUGINS</text>

  <!-- Forge -->
  <rect x="940" y="160" width="122" height="26" rx="6" fill="#1f2937" stroke="#f0b429" stroke-width="1"/>
  <text x="1001" y="177" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f0b429">⚙ Forge</text>

  <!-- SkillForge -->
  <rect x="940" y="194" width="122" height="26" rx="6" fill="#1f2937" stroke="#a78bfa" stroke-width="1"/>
  <text x="1001" y="211" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a78bfa">✦ SkillForge</text>

  <!-- Recall -->
  <rect x="940" y="228" width="122" height="26" rx="6" fill="#1f2937" stroke="#3fb950" stroke-width="1"/>
  <text x="1001" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3fb950">◎ Recall</text>

  <!-- Compute -->
  <rect x="940" y="262" width="122" height="26" rx="6" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="1001" y="279" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">⊞ Compute</text>

  <!-- Dotted connector from adapter to sidebar -->
  <line x1="918" y1="180" x2="930" y2="180" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Label bottom -->
  <text x="550" y="318"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" fill="#484f58">
    Adapter-side features (audit, TTS, grading) run on every engine — engine-specific features degrade gracefully
  </text>
