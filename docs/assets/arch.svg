<svg width="1100" height="340" viewBox="0 0 1100 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0b429"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="340" rx="10" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="550" y="28"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#8b949e" letter-spacing="2">MESSAGE FLOW</text>

  <!-- ═══════════════ TIER 1 — 7 Channels (step=138, width=120) ═══════════════ -->
  <!-- WhatsApp -->
  <rect x="30"  y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#25d366" stroke-width="1.5"/>
  <text x="90"  y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#25d366">WhatsApp</text>
  <text x="90"  y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <!-- Telegram -->
  <rect x="168" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#229ed9" stroke-width="1.5"/>
  <text x="228" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#229ed9">Telegram</text>
  <text x="228" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <!-- Discord -->
  <rect x="306" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#5865f2" stroke-width="1.5"/>
