  <line x1="504" y1="250" x2="504" y2="250" stroke="#8b949e" stroke-width="1"/>
  <line x1="596" y1="240" x2="696" y2="250" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>

