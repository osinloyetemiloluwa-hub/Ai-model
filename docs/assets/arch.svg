  <text x="387" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">per-chat profile</text>
  <rect x="440" y="163" width="90" height="20" rx="10" fill="#0d1117"/>
  <text x="485" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">auto-routing</text>
  <rect x="538" y="163" width="90" height="20" rx="10" fill="#0d1117"/>
  <text x="583" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">persona merge</text>
  <rect x="636" y="163" width="128" height="20" rx="10" fill="#0d1117"/>
  <text x="700" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">consent gate</text>
  <!-- Row 2 -->
  <rect x="244" y="189" width="90" height="20" rx="10" fill="#0d1117"/>
  <text x="289" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">TTS voice</text>
  <rect x="342" y="189" width="90" height="20" rx="10" fill="#0d1117"/>
  <text x="387" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">skill grading</text>
  <rect x="440" y="189" width="90" height="20" rx="10" fill="#0d1117"/>
  <text x="485" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">audit chain</text>
  <rect x="538" y="189" width="90" height="20" rx="10" fill="#0d1117"/>
  <text x="583" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">quota · roles</text>
  <rect x="636" y="189" width="128" height="20" rx="10" fill="#0d1117"/>
  <text x="700" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">path-gate hook</text>

  <!-- Arrow Adapter → Engine row (center=504) -->
  <line x1="504" y1="230" x2="504" y2="250" stroke="#f0b429" stroke-width="1.5" marker-end="url(#arrAmber)"/>

