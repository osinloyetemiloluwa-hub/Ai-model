<svg width="1100" height="575" viewBox="0 0 1100 575" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0b429"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="575" rx="10" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="550" y="28"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#8b949e" letter-spacing="2">MESSAGE FLOW</text>

  <!-- ═══════════════ TIER 1 — 7 Channels ═══════════════ -->
  <rect x="30"  y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#25d366" stroke-width="1.5"/>
  <text x="90"  y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#25d366">WhatsApp</text>
  <text x="90"  y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <rect x="168" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#229ed9" stroke-width="1.5"/>
  <text x="228" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#229ed9">Telegram</text>
  <text x="228" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <rect x="306" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#5865f2" stroke-width="1.5"/>
  <text x="366" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#5865f2">Discord</text>
  <text x="366" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <rect x="444" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#e01e5a" stroke-width="1.5"/>
  <text x="504" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#e01e5a">Slack</text>
  <text x="504" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <rect x="582" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#f0b429" stroke-width="1.5"/>
  <text x="642" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f0b429">Email</text>
  <text x="642" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <rect x="720" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#0078d4" stroke-width="1.5"/>
  <text x="780" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#0078d4">Teams</text>
  <text x="780" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <rect x="858" y="48" width="120" height="46" rx="8" fill="#1f2937" stroke="#3a76f0" stroke-width="1.5"/>
  <text x="918" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#3a76f0">Signal</text>
  <text x="918" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">daemon</text>

  <!-- Arrows Tier1 → funnel line -->
  <line x1="90"  y1="94" x2="90"  y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="228" y1="94" x2="228" y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="366" y1="94" x2="366" y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="504" y1="94" x2="504" y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="642" y1="94" x2="642" y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="780" y1="94" x2="780" y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="918" y1="94" x2="918" y2="112" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Funnel horizontal collector -->
  <line x1="90"  y1="112" x2="918" y2="112" stroke="#30363d" stroke-width="1.5"/>
  <line x1="504" y1="112" x2="504" y2="128" stroke="#f0b429" stroke-width="1.5" marker-end="url(#arrAmber)"/>

