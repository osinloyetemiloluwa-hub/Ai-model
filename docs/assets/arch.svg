  <text x="60" y="169" font-family="sans-serif" font-size="9.5" fill="#8b949e">orchestration · compliance · same for every engine below</text>

  <!-- Bridge Adapter -->
  <rect x="65" y="180" width="770" height="140" rx="10" fill="#1f2937" stroke="#f0b429" stroke-width="1.5"/>
  <text x="450" y="203"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
